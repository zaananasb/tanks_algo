<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Танки Онлайн — Classes & Modes</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: radial-gradient(ellipse at 50% 30%, #1a2035 0%, #0a0f1e 100%);
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
      font-family: 'Segoe UI', sans-serif; color: white; overflow: hidden;
    }
    .retro { font-family: 'Press Start 2P', cursive; }
    .screen { display: none; }
    .screen.active { display: flex; }
    .card {
      background: rgba(15,23,42,0.97); border: 1px solid #1e3a5f; border-radius: 24px;
      box-shadow: 0 25px 60px rgba(0,0,0,0.7); padding: 32px; width: 100%;
    }
    .card-auth { max-width: 440px; }
    .card-lobby { max-width: 620px; max-height: 92vh; overflow-y: auto; }
    .card-lobby::-webkit-scrollbar { width: 6px; }
    .card-lobby::-webkit-scrollbar-thumb { background: #1e3a5f; border-radius: 3px; }
    .btn {
      width: 100%; padding: 13px 18px; border-radius: 14px; font-weight: 700; font-size: 15px;
      border: none; cursor: pointer; transition: all 0.18s; color: white;
    }
    .btn:hover:not(:disabled)  { transform: translateY(-2px); filter: brightness(1.15); }
    .btn:active:not(:disabled) { transform: translateY(0); }
    .btn:disabled { opacity: 0.35; cursor: not-allowed; background: #374151 !important; }
    .btn-green  { background: linear-gradient(135deg,#059669,#10b981); }
    .btn-blue   { background: linear-gradient(135deg,#2563eb,#3b82f6); }
    .btn-orange { background: linear-gradient(135deg,#ea580c,#f97316); }
    .inp {
      width: 100%; padding: 12px 16px; background: rgba(0,0,0,0.4); border: 2px solid #1e3a5f;
      border-radius: 12px; color: white; font-size: 16px; outline: none; transition: border-color 0.2s;
    }
    .inp:focus { border-color: #f97316; }
    .inp::placeholder { color: #475569; }
    @keyframes glow {
      0%,100% { text-shadow: 0 0 8px #f97316; }
      50%     { text-shadow: 0 0 28px #f97316, 0 0 56px #f97316aa; }
    }
    .glow { animation: glow 2.5s ease-in-out infinite; }
    .pcard {
      display: flex; align-items: center; gap: 10px; padding: 8px 12px;
      background: rgba(0,0,0,0.35); border: 1px solid #1e3a5f; border-radius: 10px;
    }
    .dot { width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0; }
    .tag { margin-left: auto; font-size: 10px; font-weight: 700; padding: 2px 7px; border-radius: 20px; }
    .tag-me   { background: #78350f; color: #fbbf24; }
    .tag-host { background: #14532d; color: #4ade80; }
    .tag-team-red  { background: #7f1d1d; color: #fca5a5; }
    .tag-team-blue { background: #1e3a8a; color: #93c5fd; }
    canvas {
      display: block; border-radius: 12px; border: 3px solid #1e3a5f;
      box-shadow: 0 0 50px rgba(0,0,0,0.6); background: #0f172a;
    }
    #scoreboard {
      max-width: 800px; width: 100%; background: rgba(0,0,0,0.55); border: 1px solid #1e3a5f;
      border-radius: 12px; padding: 8px 16px; display: flex; align-items: center;
      justify-content: space-between; gap: 10px; flex-wrap: wrap;
    }
    #game-overlay {
      position: absolute; inset: 0; background: rgba(0,0,0,0.88); backdrop-filter: blur(8px);
      border-radius: 12px; display: none; flex-direction: column; align-items: center;
      justify-content: center; text-align: center; padding: 40px; z-index: 10;
    }
    #game-overlay.show { display: flex; }
    #respawn-bar {
      position: absolute; bottom: 12px; left: 50%; transform: translateX(-50%);
      background: rgba(0,0,0,0.85); border: 1px solid #f97316; border-radius: 30px;
      padding: 7px 22px; font-size: 13px; color: #fbbf24; display: none;
      white-space: nowrap; z-index: 5;
    }
    #respawn-bar.show { display: block; }
    #auth-error {
      background: #7f1d1d; border: 1px solid #ef4444; border-radius: 10px;
      padding: 10px 14px; font-size: 13px; color: #fca5a5; display: none;
    }
    #auth-error.show { display: block; }
    .opt-card {
      background: rgba(0,0,0,0.3); border: 2px solid #1e3a5f; border-radius: 12px;
      padding: 10px 6px; text-align: center; cursor: pointer; transition: all 0.2s;

    .section-label {
      font-size: 11px; font-weight: 700; color: #94a3b8; text-transform: uppercase;
      letter-spacing: 1.5px; margin-bottom: 8px;
    }
    .grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
    .grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
  </style>
</head>
<body>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
import { getDatabase, ref, set, get, onValue, update, onDisconnect } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

// ══════════════════════════════════════════════
//  FIREBASE CONFIG
// ══════════════════════════════════════════════
const firebaseConfig = {
  apiKey: "AIzaSyBtZHdsONjUjFjvVec7vTsjMoVTIKtsx0s",
  authDomain: "tanki-online-algo.firebaseapp.com",
  databaseURL: "https://tanki-online-algo-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "tanki-online-algo",
  storageBucket: "tanki-online-algo.firebasestorage.app",
  messagingSenderId: "790323345404",
  appId: "1:790323345404:web:2b7540ca84c5977aa9a479",
  measurementId: "G-5WTXB7GLPX"
};
const fbApp = initializeApp(firebaseConfig);
const db = getDatabase(fbApp);

// ══════════════════════════════════════════════
//  CONSTANTS
// ══════════════════════════════════════════════
const W = 800, H = 600, CELL = 40;
const SHOOT_CD = 500;
const RESPAWN_MS = 3000;
const INPUT_MS = 50;
const HOST_TICK = 1000 / 30;
const SWAMP_SLOW = 0.48;
const MINE_RADIUS = 20;
const CAPTURE_RADIUS = 44;
const CAPTURE_TIME = 180; // ticks to capture a point (~6 sec)
const CAPTURE_WIN_SCORE = 100;

// ══════════════════════════════════════════════
//  CLASS DEFINITIONS
// ══════════════════════════════════════════════
const CLASSES = {
  tank:      { name:'Танк',        hp:3, lives:3, speed:3.0,  shootCd:500, bSpeed:8,  bDmg:1, half:18, bLen:13, bW:5, icon:'🛡️', desc:'Баланс' },
  scout:     { name:'Разведчик',   hp:2, lives:4, speed:4.5,  shootCd:350, bSpeed:10, bDmg:1, half:14, bLen:11, bW:4, icon:'⚡',  desc:'Быстрый' },
  heavy:     { name:'Тяжёлый',     hp:5, lives:2, speed:2.0,  shootCd:700, bSpeed:7,  bDmg:2, half:23, bLen:15, bW:7, icon:'💎', desc:'Крепкий' },
  artillery: { name:'Артиллерия',  hp:2, lives:3, speed:2.5,  shootCd:900, bSpeed:13, bDmg:3, half:16, bLen:20, bW:4, icon:'🎯', desc:'Снайпер' }
};
const CLASS_IDS = ['tank','scout','heavy','artillery'];

// ══════════════════════════════════════════════
//  MAP DEFINITIONS
// ══════════════════════════════════════════════
const MAPS = [
  { name:'Арена',     desc:'Открытый бой',      icon:'🏟️' },
  { name:'Лабиринт',  desc:'Узкие коридоры',     icon:'🌀' },
  { name:'Крепость',  desc:'Базы и стены',       icon:'🏰' }
];

// ══════════════════════════════════════════════
//  MODE DEFINITIONS
// ══════════════════════════════════════════════
const MODES = [
  { name:'Бой насмерть',     desc:'FFA — последний живой',  icon:'💀', teamMode:false },
  { name:'Разрушение баз',   desc:'Убей базу врага',        icon:'🏰', teamMode:true  },
  { name:'Захват точек',     desc:'Удерживай позиции',       icon:'📍', teamMode:true  }
];

// ══════════════════════════════════════════════
//  SPAWNS
// ══════════════════════════════════════════════
const SPAWNS = [
  { x: 60, y: 60, dir:'right' }, { x:740, y:540, dir:'left' },
  { x:740, y: 60, dir:'left'  }, { x: 60, y:540, dir:'right'},
  { x:400, y: 45, dir:'down'  }, { x:400, y:555, dir:'up'   }
];
const TEAM_SPAWNS = {
  red:  [{ x:60, y:200, dir:'right' },{ x:60, y:300, dir:'right' },{ x:60, y:400, dir:'right' }],
  blue: [{ x:740,y:200, dir:'left'  },{ x:740,y:300, dir:'left'  },{ x:740,y:400, dir:'left'  }]
};
const COLORS = ['#22c55e','#ef4444','#3b82f6','#eab308','#a855f7','#f97316'];

function getTeam(pid) {
  const idx = parseInt(pid.replace('p','')) - 1;
  return idx % 2 === 0 ? 'red' : 'blue';
}

// ══════════════════════════════════════════════
//  STATE
// ══════════════════════════════════════════════
let myId = null, myName = '', roomCode = null, isHost = false;
let gameRunning = false, gameOverShown = false;
let roomRef = null, bulletSeq = 0;
let myClass = 'tank';
let selectedMode = 0, selectedMap = 0;

const G = {
  players:{}, bullets:{}, walls:[], swamps:[], mines:[], particles:[],
  bases:{}, capturePoints:[], teamScores:{red:0,blue:0},
  settings:{ mode:0, mapId:0 }
};

const renderTanks = {}, renderTargets = {};
const INTERP_SPEED = 0.18;

const myKeys = { up:false, down:false, left:false, right:false };
let myShootTs = 0, lastInputSend = 0;
const hostInput = {}, hostLastShoot = {};
let lastHostTick = 0, scoreTickAccum = 0;

const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

// ══════════════════════════════════════════════
//  KEYBOARD
// ══════════════════════════════════════════════
window.addEventListener('keydown', e => {
  if (!gameRunning) return;
  let h = true;
  switch (e.code) {
    case 'ArrowUp':    case 'KeyW': myKeys.up    = true; break;
    case 'ArrowDown':  case 'KeyS': myKeys.down  = true; break;
    case 'ArrowLeft':  case 'KeyA': myKeys.left  = true; break;
    case 'ArrowRight': case 'KeyD': myKeys.right = true; break;
    case 'Space': {
      const now = Date.now();
      if (now - myShootTs >= SHOOT_CD) myShootTs = now;
      break;
    }
    default: h = false;
  }
  if (h) e.preventDefault();
});
window.addEventListener('keyup', e => {
  switch (e.code) {
    case 'ArrowUp':    case 'KeyW': myKeys.up    = false; break;
    case 'ArrowDown':  case 'KeyS': myKeys.down  = false; break;
    case 'ArrowLeft':  case 'KeyA': myKeys.left  = false; break;
    case 'ArrowRight': case 'KeyD': myKeys.right = false; break;
  }
});

// ══════════════════════════════════════════════
//  UI HELPERS
// ══════════════════════════════════════════════
function showScreen(name) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-' + name).classList.add('active');
}
function showError(msg) {
  const el = document.getElementById('auth-error');
  el.textContent = msg; el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 4500);
}

// ══════════════════════════════════════════════
//  MAP GENERATORS
// ══════════════════════════════════════════════
function isSafeCell(cx, cy, extraSafe) {
  const nearSpawn = SPAWNS.some(s => Math.abs(s.x - cx) < 105 && Math.abs(s.y - cy) < 105);
  const nearTeamRed = TEAM_SPAWNS.red.some(s => Math.abs(s.x - cx) < 110 && Math.abs(s.y - cy) < 110);
  const nearTeamBlue = TEAM_SPAWNS.blue.some(s => Math.abs(s.x - cx) < 110 && Math.abs(s.y - cy) < 110);
  const inCenter = cx > 320 && cx < 480 && cy > 220 && cy < 380;
  if (extraSafe) {
    const nearBase = (cx < 220 && cy > 160 && cy < 440) || (cx > 580 && cy > 160 && cy < 440);
    return !nearSpawn && !nearTeamRed && !nearTeamBlue && !inCenter && !nearBase;
  }
  return !nearSpawn && !nearTeamRed && !nearTeamBlue && !inCenter;
}

function shuffledCells(extraSafe) {
  const cells = [];
  for (let c = 1; c < W / CELL - 1; c++)
    for (let r = 1; r < H / CELL - 1; r++) {
      const cx = c * CELL + CELL / 2, cy = r * CELL + CELL / 2;
      if (isSafeCell(cx, cy, extraSafe)) cells.push({ x:c * CELL, y:r * CELL });
    }
  for (let i = cells.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [cells[i], cells[j]] = [cells[j], cells[i]];
  }
  return cells;
}

function generateMap(mapId) {
  const walls = [], swamps = [], mines = [];
  const used = new Set();
  const cells = shuffledCells(mapId === 2);
  let ci = 0;
  const take = () => { while (ci < cells.length) { const c = cells[ci++]; const k = c.x+':'+c.y; if (!used.has(k)) { used.add(k); return c; } } return null; };

  if (mapId === 0) { // Арена
    for (let i = 0; i < 45; i++) { const c = take(); if (!c) break; const st = Math.random() < 0.22; walls.push({ x:c.x, y:c.y, hp:st?99:1, maxHp:st?99:1 }); }
    for (let i = 0; i < 8;  i++) { const c = take(); if (!c) break; swamps.push({ x:c.x, y:c.y }); }
    for (let i = 0; i < 10; i++) { const c = take(); if (!c) break; mines.push({ x:c.x + CELL/2, y:c.y + CELL/2 }); }
  } else if (mapId === 1) { // Лабиринт
    for (let c = 1; c < W/CELL-1; c++) for (let r = 1; r < H/CELL-1; r++) {
      if ((c + r) % 2 === 0 && Math.random() < 0.65) {
        const cx = c*CELL, cy = r*CELL;
        if (isSafeCell(cx+CELL/2, cy+CELL/2, false) && !used.has(cx+':'+cy)) {
          used.add(cx+':'+cy);
          const st = Math.random() < 0.15;
          walls.push({ x:cx, y:cy, hp:st?99:1, maxHp:st?99:1 });
        }
      }
    }
    for (let i = 0; i < 5; i++) { const c = take(); if (!c) break; swamps.push({ x:c.x, y:c.y }); }
    for (let i = 0; i < 7; i++) { const c = take(); if (!c) break; mines.push({ x:c.x + CELL/2, y:c.y + CELL/2 }); }
  } else { // Крепость
    // Fortress walls for red team (left)
    const redFort = [[2,4],[2,5],[2,6],[2,7],[2,8],[2,9],[3,9],[4,9],[5,4],[5,5],[5,6],[5,7],[5,8],[5,9]];
    // Fortress walls for blue team (right)
    const blueFort= [[14,4],[14,5],[14,6],[14,7],[14,8],[14,9],[15,9],[16,9],[17,4],[17,5],[17,6],[17,7],[17,8],[17,9]];
    // Center cover
    const centerWalls = [[8,5],[8,6],[8,8],[8,9],[9,5],[9,9],[10,5],[10,9],[11,5],[11,6],[11,8],[11,9]];
    const allFixed = [...redFort, ...blueFort, ...centerWalls];
    for (const [cc,rr] of allFixed) {
      const wx = cc*CELL, wy = rr*CELL;
      if (!used.has(wx+':'+wy)) { used.add(wx+':'+wy); walls.push({ x:wx, y:wy, hp:1, maxHp:1 }); }
    }
    for (let i = 0; i < 6; i++) { const c = take(); if (!c) break; swamps.push({ x:c.x, y:c.y }); }
    for (let i = 0; i < 8; i++) { const c = take(); if (!c) break; mines.push({ x:c.x + CELL/2, y:c.y + CELL/2 }); }
  }

  // Bases for bedwars mode (always generate, only used in mode 1)
  const bases = {
    red:  { x:120, y:300, hp:25, maxHp:25 },
    blue: { x:680, y:300, hp:25, maxHp:25 }
  };

  // Capture points (always generate, only used in mode 2)
  const capPts = [
    { x:200, y:150, owner:null, progress:0 },
    { x:400, y:300, owner:null, progress:0 },
    { x:600, y:450, owner:null, progress:0 }
  ];

  return { walls, swamps, mines, bases, capturePoints: capPts };
}

// ══════════════════════════════════════════════
//  COLLISION HELPERS
// ══════════════════════════════════════════════
function hitsWall(nx, ny, hs) {
  for (const w of G.walls) {
    if (!w) continue;
    if (nx + hs > w.x && nx - hs < w.x + CELL && ny + hs > w.y && ny - hs < w.y + CELL) return true;
  }
  return false;
}
function bulletHitsWall(x, y, w) {
  return x >= w.x && x <= w.x + CELL && y >= w.y && y <= w.y + CELL;
}
function outBounds(nx, ny, hs) {
  return nx - hs < 0 || nx + hs > W || ny - hs < 0 || ny + hs > H;
}
function inSwamp(x, y) {
  for (const s of G.swamps) { if (!s) continue; if (x > s.x && x < s.x + CELL && y > s.y && y < s.y + CELL) return true; }
  return false;
}
function inCaptureZone(x, y, cp) {
  return Math.hypot(x - cp.x, y - cp.y) < CAPTURE_RADIUS;
}

// ══════════════════════════════════════════════
//  PARTICLES
// ══════════════════════════════════════════════
function spawnExplosion(x, y, color, count) {
  for (let i = 0; i < count; i++) {
    const a = Math.random()*Math.PI*2, sp = 1+Math.random()*4;
    G.particles.push({ x,y, vx:Math.cos(a)*sp, vy:Math.sin(a)*sp, life:20+Math.random()*20, maxLife:40, color:Math.random()<0.4?'#fef9c3':color, size:2+Math.random()*4 });
  }
}
function spawnDebris(x, y) {
  for (let i = 0; i < 8; i++) {
    const a = Math.random()*Math.PI*2, sp = 1+Math.random()*2;
    G.particles.push({ x:x+20,y:y+20, vx:Math.cos(a)*sp, vy:Math.sin(a)*sp, life:15+Math.random()*15, maxLife:30, color:'#92400e', size:2+Math.random()*3 });
  }
}
function tickParticles() {
  for (let i = G.particles.length-1; i >= 0; i--) {
    const p = G.particles[i]; p.x+=p.vx; p.y+=p.vy; p.vx*=0.96; p.vy*=0.96; p.life--;
    if (p.life<=0) G.particles.splice(i,1);
  }
}

// ══════════════════════════════════════════════
//  SOUNDS
// ══════════════════════════════════════════════
let audioCtx = null;
function snd(type) {
  try {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const o = audioCtx.createOscillator(), g = audioCtx.createGain(); o.connect(g); g.connect(audioCtx.destination);
    const t = audioCtx.currentTime;
    if (type==='shoot') { o.type='square'; o.frequency.setValueAtTime(600,t); o.frequency.exponentialRampToValueAtTime(200,t+0.08); g.gain.setValueAtTime(0.08,t); g.gain.exponentialRampToValueAtTime(0.001,t+0.08); o.start(t); o.stop(t+0.08); }
    else if (type==='hit') { o.type='sawtooth'; o.frequency.setValueAtTime(300,t); o.frequency.exponentialRampToValueAtTime(80,t+0.15); g.gain.setValueAtTime(0.1,t); g.gain.exponentialRampToValueAtTime(0.001,t+0.15); o.start(t); o.stop(t+0.15); }
    else if (type==='explode') { o.type='sawtooth'; o.frequency.setValueAtTime(150,t); o.frequency.exponentialRampToValueAtTime(30,t+0.35); g.gain.setValueAtTime(0.15,t); g.gain.exponentialRampToValueAtTime(0.001,t+0.35); o.start(t); o.stop(t+0.35); }
    else if (type==='respawn') { o.type='sine'; o.frequency.setValueAtTime(400,t); o.frequency.exponentialRampToValueAtTime(800,t+0.12); g.gain.setValueAtTime(0.06,t); g.gain.exponentialRampToValueAtTime(0.001,t+0.12); o.start(t); o.stop(t+0.12); }
    else if (type==='capture') { o.type='sine'; o.frequency.setValueAtTime(500,t); o.frequency.exponentialRampToValueAtTime(900,t+0.2); g.gain.setValueAtTime(0.07,t); g.gain.exponentialRampToValueAtTime(0.001,t+0.2); o.start(t); o.stop(t+0.2); }
  } catch(e){}
}

function openLobby() {
  document.getElementById('display-room-code').textContent = roomCode;
  showScreen('lobby');
  document.getElementById('mode-section').style.display = isHost ? '' : 'none';
  document.getElementById('map-section').style.display  = isHost ? '' : 'none';
  document.getElementById('host-controls').style.display = isHost ? '' : 'none';
  document.getElementById('student-wait').style.display  = isHost ? 'none' : '';
  buildLobbyCards();

  onValue(roomRef, snap => {
    const data = snap.val(); if (!data) return;

    // Sync settings
    if (data.settings) {
      selectedMode = data.settings.mode ?? 0;
      selectedMap  = data.settings.mapId ?? 0;
      G.settings   = data.settings;
    }
    if (!isHost) buildLobbyCards();

    if (!(isHost && gameRunning)) {
      const newPlayers = data.players || {};
      for (const [pid, p] of Object.entries(newPlayers)) {
        if (!renderTargets[pid]) { renderTargets[pid] = { x:p.x, y:p.y }; renderTanks[pid] = { x:p.x, y:p.y }; }
        else { renderTargets[pid].x = p.x; renderTargets[pid].y = p.y; }
      }
      for (const pid of Object.keys(renderTargets)) if (!newPlayers[pid]) { delete renderTargets[pid]; delete renderTanks[pid]; }
      G.players = newPlayers;
      G.walls = data.walls || []; G.swamps = data.swamps || []; G.mines = data.mines || [];
      G.bullets = data.bullets || {};
      G.bases = data.bases || {};
      G.capturePoints = data.capturePoints || [];
      G.teamScores = data.teamScores || { red:0, blue:0 };
    }

    const entries = Object.entries(data.players || {});
    const isTeam = MODES[selectedMode]?.teamMode;
    document.getElementById('player-count-badge').textContent = `${entries.length}/6`;
    document.getElementById('player-list').innerHTML = entries.map(([id,p]) => {
      const cls = CLASSES[p.class || 'tank'];
      const team = getTeam(id);
      const teamTag = isTeam ? `<span class="tag ${team==='red'?'tag-team-red':'tag-team-blue'}">${team==='red'?'🔴':'🔵'}</span>` : '';
      return `<div class="pcard" ${isTeam?`style="border-left:3px solid ${team==='red'?'#ef4444':'#3b82f6'}"`:''}>
        <div class="dot" style="background:${p.color}"></div>
        <span style="font-weight:600;">${cls?.icon||'🛡️'} ${p.name}</span>
        ${id===myId?'<span class="tag tag-me">ВЫ</span>':''}
        ${id==='p1'?'<span class="tag tag-host">👑</span>':''}
        ${teamTag}
      </div>`;
    }).join('');

    if (isHost) {
      document.getElementById('btn-start-game').disabled = entries.length < 2;
      document.getElementById('lobby-status').textContent = entries.length < 2 ? '⏳ Ждём учеников...' : `✅ ${entries.length} игроков`;
    }

    if (data.status === 'playing' && !gameRunning) {
      gameRunning = true; gameOverShown = false; G.particles = [];
      G.settings = data.settings || { mode:0, mapId:0 };
      if (isHost) {
        G.players = JSON.parse(JSON.stringify(data.players || {}));
        G.walls = JSON.parse(JSON.stringify(data.walls || []));
        G.swamps = JSON.parse(JSON.stringify(data.swamps || []));
        G.mines = JSON.parse(JSON.stringify(data.mines || []));
        G.bases = JSON.parse(JSON.stringify(data.bases || {}));
        G.capturePoints = JSON.parse(JSON.stringify(data.capturePoints || []));
        G.teamScores = { red:0, blue:0 };
        G.bullets = {};
      } else {
        for (const [pid, p] of Object.entries(data.players || {})) {
          renderTargets[pid] = { x:p.x, y:p.y }; renderTanks[pid] = { x:p.x, y:p.y };
        }
      }
      showScreen('game');
      document.getElementById('ui-mode').textContent = MODES[G.settings.mode]?.name || '???';
      requestAnimationFrame(gameLoop);
    }

    if (data.status === 'ended' && !gameOverShown) {
      G.players = data.players || G.players;
      G.teamScores = data.teamScores || G.teamScores;
      showGameOver(data.winner);
    }
  });
}

  if (!gameRunning) return;

// ══════════════════════════════════════════════
//  DAMAGE HELPER
// ══════════════════════════════════════════════
function damagePlayer(pid, damage, fb, now, killerId) {
  const t = G.players[pid]; if (!t || t.dead) return;
  const cls = CLASSES[t.class || 'tank'];
  const newHp = (t.hp || 1) - damage;
  if (newHp <= 0) {
    const nl = (t.lives || 1) - 1;
    t.hp = 0; t.lives = nl; t.dead = true;
    // In bedwars: can respawn if base alive; otherwise no respawn
    const canRespawn = nl > 0 && (G.settings.mode !== 1 || (G.bases[getTeam(pid)]?.hp ?? 0) > 0);
    t.respawnAt = canRespawn ? now + RESPAWN_MS : 0;
    fb[`players/${pid}/hp`] = 0; fb[`players/${pid}/lives`] = nl;
    fb[`players/${pid}/dead`] = true; fb[`players/${pid}/respawnAt`] = t.respawnAt;
    if (killerId && killerId !== pid && G.players[killerId]) {
      G.players[killerId].score = (G.players[killerId].score || 0) + 1;
      fb[`players/${killerId}/score`] = G.players[killerId].score;
    }
    spawnExplosion(t.x, t.y, t.color || '#ff0000', 25); snd('explode');
  } else {
    t.hp = newHp; fb[`players/${pid}/hp`] = newHp;
    spawnExplosion(t.x, t.y, '#fef9c3', 8); snd('hit');
  }
}

// ══════════════════════════════════════════════
//  HOST TICK
// ══════════════════════════════════════════════
function hostTick(ts) {
  if (ts - lastHostTick < HOST_TICK) return;
  lastHostTick = ts;
  const now = Date.now();
  const fb = {};
  let minesDirty = false, wallsDirty = false;
  const mode = G.settings.mode || 0;

  // ── Move players ──
  for (const [pid, p] of Object.entries(G.players)) {
    if (p.dead) continue;
    const inp = hostInput[pid]; if (!inp) continue;
    const cls = CLASSES[p.class || 'tank'];
    let pSpeed = cls.speed;
    if (inSwamp(p.x, p.y)) pSpeed *= SWAMP_SLOW;
    const hs = cls.half;

    let nx = p.x, ny = p.y, ndir = p.dir, moved = false;
    if      (inp.u) { ny -= pSpeed; ndir = 'up';    moved = true; }
    else if (inp.d) { ny += pSpeed; ndir = 'down';  moved = true; }
    else if (inp.l) { nx -= pSpeed; ndir = 'left';  moved = true; }
    else if (inp.r) { nx += pSpeed; ndir = 'right'; moved = true; }

    if (moved && !outBounds(nx, ny, hs) && !hitsWall(nx, ny, hs)) {
      p.x = nx; p.y = ny; p.dir = ndir;
      fb[`players/${pid}/x`] = nx; fb[`players/${pid}/y`] = ny; fb[`players/${pid}/dir`] = ndir;
    } else if (moved && p.dir !== ndir) {
      p.dir = ndir; fb[`players/${pid}/dir`] = ndir;
    }

    // Mines
    for (let i = 0; i < G.mines.length; i++) {
      const m = G.mines[i]; if (!m) continue;
      if (Math.hypot(p.x - m.x, p.y - m.y) < hs + MINE_RADIUS * 0.65) {
        G.mines[i] = null; minesDirty = true;
        damagePlayer(pid, 2, fb, now); spawnExplosion(m.x, m.y, '#f97316', 22); break;
      }
    }

    // Shooting
    if (inp.s && inp.s > (hostLastShoot[pid] || 0) && !p.dead) {
      hostLastShoot[pid] = inp.s;
      const off = hs + cls.bLen + 1;
      let bx = p.x, by = p.y;
      if (p.dir==='up') by-=off; else if (p.dir==='down') by+=off;
      else if (p.dir==='left') bx-=off; else bx+=off;
      const bId = 'b'+(++bulletSeq);
      G.bullets[bId] = { x:bx, y:by, dir:p.dir, owner:pid, dmg:cls.bDmg, spd:cls.bSpeed };
      fb[`bullets/${bId}`] = G.bullets[bId];
      snd('shoot');
    }
  }

  // ── Respawn ──
  for (const [pid, p] of Object.entries(G.players)) {
    if (p.dead && p.lives > 0 && p.respawnAt > 0 && now >= p.respawnAt) {
      const team = getTeam(pid);
      let sp;
      if (MODES[mode]?.teamMode) {
        const tSpawns = TEAM_SPAWNS[team] || SPAWNS;
        const tIdx = Math.floor(Math.random() * tSpawns.length);
        sp = tSpawns[tIdx];
      } else {
        const idx = parseInt(pid.replace('p',''))-1;
        sp = SPAWNS[idx < SPAWNS.length ? idx : 0];
      }
      p.dead = false; p.hp = CLASSES[p.class||'tank'].hp; p.x = sp.x; p.y = sp.y; p.dir = sp.dir; p.respawnAt = 0;
      fb[`players/${pid}/dead`]=false; fb[`players/${pid}/hp`]=p.hp;
      fb[`players/${pid}/x`]=sp.x; fb[`players/${pid}/y`]=sp.y; fb[`players/${pid}/dir`]=sp.dir; fb[`players/${pid}/respawnAt`]=0;
      snd('respawn');
    }
  }

  // ── Bullets ──
  const bulletsToDelete = [];
  for (const [bId, b] of Object.entries(G.bullets)) {
    if (!b) { bulletsToDelete.push(bId); continue; }
    let { x, y, dir, owner, dmg, spd } = b;
    const bSpd = spd || 8;
    if (dir==='up') y-=bSpd; else if (dir==='down') y+=bSpd;
    else if (dir==='left') x-=bSpd; else x+=bSpd;

    if (x<0||x>W||y<0||y>H) { bulletsToDelete.push(bId); continue; }

    // Wall hit
    let hitWall = false;
    for (let i = 0; i < G.walls.length; i++) {
      const w = G.walls[i]; if (!w) continue;
      if (bulletHitsWall(x, y, w)) {
        if (w.hp < 99) { w.hp--; if (w.hp<=0) { G.walls[i]=null; spawnDebris(w.x,w.y); } }
        hitWall = true; wallsDirty = true; break;
      }
    }
    if (hitWall) { bulletsToDelete.push(bId); continue; }

    // Mine hit by bullet
    let hitMine = false;
    for (let i = 0; i < G.mines.length; i++) {
      const m = G.mines[i]; if (!m) continue;
      if (Math.hypot(x-m.x, y-m.y) < MINE_RADIUS) {
        G.mines[i]=null; minesDirty=true; hitMine=true;
        spawnExplosion(m.x, m.y, '#f97316', 18); snd('explode'); break;
      }
    }
    if (hitMine) { bulletsToDelete.push(bId); continue; }

    // Base hit (bedwars)
    if (mode === 1) {
      for (const [team, base] of Object.entries(G.bases)) {
        if (!base || base.hp <= 0) continue;
        if (Math.hypot(x - base.x, y - base.y) < 40) {
          base.hp -= (dmg || 1);
          fb[`bases/${team}/hp`] = base.hp;
          G.bases[team] = base;
          spawnExplosion(x, y, team==='red'?'#ef4444':'#3b82f6', 12);
          snd('hit');
          if (base.hp <= 0) { snd('explode'); spawnExplosion(base.x, base.y, team==='red'?'#ef4444':'#3b82f6', 30); }
          bulletsToDelete.push(bId);
          hitWall = true; // reuse flag to skip player check
          break;
        }
      }
      if (hitWall) continue;
    }

    // Player hit
    let hitPid = null;
    for (const [pid, p] of Object.entries(G.players)) {
      if (pid === owner || p.dead) continue;
      // In team modes, don't hit teammates
      if (MODES[mode]?.teamMode && getTeam(pid) === getTeam(owner)) continue;
      const cls2 = CLASSES[p.class || 'tank'];
      if (Math.hypot(p.x-x, p.y-y) < cls2.half + 5) { hitPid = pid; break; }
    }
    if (hitPid) {
      damagePlayer(hitPid, dmg||1, fb, now, owner);
      bulletsToDelete.push(bId); continue;
    }

    b.x = x; b.y = y;
    fb[`bullets/${bId}`] = { x,y,dir,owner,dmg,spd };
  }
  for (const bId of bulletsToDelete) { delete G.bullets[bId]; fb[`bullets/${bId}`]=null; }

  if (wallsDirty) { G.walls = G.walls.filter(Boolean); fb.walls = G.walls; }
  if (minesDirty) { G.mines = G.mines.filter(Boolean); fb.mines = G.mines; }

  // ── Capture points scoring (mode 2) ──
  if (mode === 2) {
    for (const cp of G.capturePoints) {
      if (!cp) continue;
      let redCount = 0, blueCount = 0;
      for (const [pid, p] of Object.entries(G.players)) {
        if (p.dead) continue;
        if (inCaptureZone(p.x, p.y, cp)) {
          if (getTeam(pid) === 'red') redCount++; else blueCount++;
        }
      }
      if (redCount > 0 && blueCount === 0) {
        if (cp.progress < CAPTURE_TIME) { cp.progress++; }
        if (cp.progress >= CAPTURE_TIME && cp.owner !== 'red') { cp.owner = 'red'; snd('capture'); }
      } else if (blueCount > 0 && redCount === 0) {
        if (cp.progress > -CAPTURE_TIME) { cp.progress--; }
        if (cp.progress <= -CAPTURE_TIME && cp.owner !== 'blue') { cp.owner = 'blue'; snd('capture'); }
      }
    }
    // Score accumulation
    scoreTickAccum++;
    if (scoreTickAccum >= 30) { // every ~1 second
      scoreTickAccum = 0;
      for (const cp of G.capturePoints) {
        if (!cp || !cp.owner) continue;
        G.teamScores[cp.owner] = (G.teamScores[cp.owner] || 0) + 1;
      }
      fb.teamScores = G.teamScores;
      fb.capturePoints = G.capturePoints;
    }
  }

  if (Object.keys(fb).length > 0) update(ref(db, `rooms/${roomCode}`), fb);
  checkEndGame();
}

// ══════════════════════════════════════════════
//  INTERPOLATION
// ══════════════════════════════════════════════
function interpolateTanks() {
  for (const [pid, p] of Object.entries(G.players)) {
    if (pid === myId || p.dead) continue;
    if (!renderTanks[pid] || !renderTargets[pid]) continue;
    const rt = renderTanks[pid], tg = renderTargets[pid];
    rt.x += (tg.x - rt.x) * INTERP_SPEED;
    rt.y += (tg.y - rt.y) * INTERP_SPEED;
    if (Math.abs(rt.x-tg.x)<0.3) rt.x=tg.x;
    if (Math.abs(rt.y-tg.y)<0.3) rt.y=tg.y;
    p._rx = rt.x; p._ry = rt.y;
  }
}

// ══════════════════════════════════════════════
//  END GAME
// ══════════════════════════════════════════════
function checkEndGame() {
  if (gameOverShown) return;
  const mode = G.settings.mode || 0;
  const all = Object.values(G.players);
  if (all.length < 2) return;

  let winner = null;

  if (mode === 0) { // Deathmatch: last standing
    const alive = all.filter(p => p.lives > 0);
    if (alive.length <= 1) { winner = alive[0]?.name || null; }
  } else if (mode === 1) { // Bedwars: bases destroyed
    const redBaseAlive  = (G.bases.red?.hp ?? 0) > 0;
    const blueBaseAlive = (G.bases.blue?.hp ?? 0) > 0;
    if (!redBaseAlive && !blueBaseAlive) { winner = 'Ничья'; }
    else if (!redBaseAlive) {
      const blueAlive = all.filter(p => p.lives > 0 && getTeam(Object.entries(G.players).find(([k,v])=>v===p)?.[0]||'')==='blue');
      if (blueAlive.length > 0) winner = '🔵 Синие';
    } else if (!blueBaseAlive) {
      const redAlive = all.filter(p => p.lives > 0 && getTeam(Object.entries(G.players).find(([k,v])=>v===p)?.[0]||'')==='red');
      if (redAlive.length > 0) winner = '🔴 Красные';
    }
  } else if (mode === 2) { // Capture: score reached
    if (G.teamScores.red >= CAPTURE_WIN_SCORE) winner = '🔴 Красные';
    else if (G.teamScores.blue >= CAPTURE_WIN_SCORE) winner = '🔵 Синие';
    // Also check if one team is eliminated
    const redAlive = all.some(p => p.lives > 0 && getTeam(Object.entries(G.players).find(([k,v])=>v===p)?.[0]||'')==='red');
    const blueAlive = all.some(p => p.lives > 0 && getTeam(Object.entries(G.players).find(([k,v])=>v===p)?.[0]||'')==='blue');
    if (!redAlive && blueAlive) winner = '🔵 Синие';
    if (!blueAlive && redAlive) winner = '🔴 Красные';
    if (!redAlive && !blueAlive) winner = 'Ничья';
  }

  if (winner) {
    gameRunning = false; gameOverShown = true;
    update(roomRef, { status:'ended', winner, teamScores:G.teamScores });
    showGameOver(winner);
  }
}

function showGameOver(winnerName) {
  gameRunning = false; gameOverShown = true;
  const myTeam = getTeam(myId);
  const isWin = winnerName && (
    (winnerName === myName) ||
    (MODES[G.settings.mode]?.teamMode && (
      (winnerName.includes('Красные') && myTeam==='red') ||
      (winnerName.includes('Синие') && myTeam==='blue')
    ))
  );
  document.getElementById('overlay-icon').textContent  = isWin ? '🏆' : '💀';
  document.getElementById('overlay-title').textContent = isWin ? 'ПОБЕДА!' : 'КОНЕЦ БОЯ';
  document.getElementById('overlay-winner').textContent = winnerName || 'Ничья!';
  const mode = G.settings.mode || 0;
  if (MODES[mode]?.teamMode) {
    document.getElementById('overlay-scores').innerHTML =
      `<span style="color:#ef4444">🔴 Красные: ${G.teamScores.red||0}</span><br><span style="color:#3b82f6">🔵 Синие: ${G.teamScores.blue||0}</span><br><br>` +
      Object.values(G.players).sort((a,b)=>(b.score||0)-(a.score||0)).map(p=>`${CLASSES[p.class||'tank']?.icon||''} ${p.name}: ${p.score||0}`).join('<br>');
  } else {
    document.getElementById('overlay-scores').innerHTML =
      Object.values(G.players).sort((a,b)=>(b.score||0)-(a.score||0)).map(p=>`${CLASSES[p.class||'tank']?.icon||''} ${p.name}: ${p.score||0}`).join('<br>');
  }
  document.getElementById('game-overlay').classList.add('show');
  if (isHost) setTimeout(() => set(roomRef, null), 60000);
}

// ══════════════════════════════════════════════
//  RENDERING
// ══════════════════════════════════════════════
function render() {
  ctx.fillStyle = '#0f172a'; ctx.fillRect(0,0,W,H);
  // Grid
  ctx.strokeStyle='#1a2640'; ctx.lineWidth=1;
  for (let x=0;x<=W;x+=CELL){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke();}
  for (let y=0;y<=H;y+=CELL){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();}

  drawSwamps();
  drawCaptureZones();
  drawMines();
  drawBases();
  drawWalls();
  drawTanks();
  drawBullets();
  drawParticles();
}

function drawSwamps() {
  for (const s of G.swamps) {
    if (!s) continue;
    const grd = ctx.createRadialGradient(s.x+20,s.y+20,3,s.x+20,s.y+20,28);
    grd.addColorStop(0,'rgba(63,98,18,0.95)'); grd.addColorStop(1,'rgba(20,83,45,0.62)');
    ctx.fillStyle=grd; ctx.fillRect(s.x,s.y,CELL,CELL);
    ctx.strokeStyle='rgba(132,204,22,0.35)'; ctx.lineWidth=2;
    ctx.beginPath(); ctx.arc(s.x+14,s.y+15,6,0,Math.PI*2); ctx.arc(s.x+27,s.y+27,8,0,Math.PI*2); ctx.stroke();
  }
}

function drawMines() {
  for (const m of G.mines) {
    if (!m) continue;
    ctx.save(); ctx.translate(m.x, m.y);
    ctx.fillStyle='#111827'; ctx.beginPath(); ctx.arc(0,0,12,0,Math.PI*2); ctx.fill();
    ctx.strokeStyle='#ef4444'; ctx.lineWidth=2; ctx.stroke();
    ctx.strokeStyle='#f97316'; ctx.lineWidth=2;
    for (let i=0;i<8;i++){const a=i*Math.PI/4;ctx.beginPath();ctx.moveTo(Math.cos(a)*7,Math.sin(a)*7);ctx.lineTo(Math.cos(a)*15,Math.sin(a)*15);ctx.stroke();}
    ctx.fillStyle='#fbbf24'; ctx.beginPath(); ctx.arc(0,0,3,0,Math.PI*2); ctx.fill();
    ctx.restore();
  }
}

function drawBases() {
  if (G.settings.mode !== 1) return;
  for (const [team, base] of Object.entries(G.bases)) {
    if (!base) continue;
    const col = team === 'red' ? '#ef4444' : '#3b82f6';
    const alive = base.hp > 0;
    // Base area
    ctx.fillStyle = alive ? col + '22' : '#1f293788';
    ctx.fillRect(base.x - 36, base.y - 36, 72, 72);
    ctx.strokeStyle = alive ? col : '#475569';
    ctx.lineWidth = 2;
    ctx.strokeRect(base.x - 36, base.y - 36, 72, 72);
    // Core
    if (alive) {
      ctx.shadowBlur = 18; ctx.shadowColor = col;
      ctx.fillStyle = col;
      ctx.beginPath(); ctx.arc(base.x, base.y, 18, 0, Math.PI*2); ctx.fill();
      ctx.shadowBlur = 0;
      ctx.fillStyle = '#fff';
      ctx.font = 'bold 16px sans-serif'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillText('💎', base.x, base.y);
    } else {
      ctx.fillStyle = '#374151';
      ctx.beginPath(); ctx.arc(base.x, base.y, 18, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = '#ef4444'; ctx.font = 'bold 14px sans-serif'; ctx.textAlign = 'center';
      ctx.fillText('✕', base.x, base.y + 5);
    }
    // HP bar
    const bw = 60;
    ctx.fillStyle = '#1f2937'; ctx.fillRect(base.x - bw/2, base.y - 48, bw, 7);
    const ratio = Math.max(0, base.hp / base.maxHp);
    ctx.fillStyle = ratio > 0.5 ? '#22c55e' : ratio > 0.25 ? '#eab308' : '#ef4444';
    ctx.fillRect(base.x - bw/2, base.y - 48, bw * ratio, 7);
    ctx.strokeStyle = '#374151'; ctx.lineWidth = 1; ctx.strokeRect(base.x - bw/2, base.y - 48, bw, 7);
    // Label
    ctx.fillStyle = col; ctx.font = 'bold 11px sans-serif'; ctx.textAlign = 'center';
    ctx.fillText(team==='red'?'КРАСНЫЕ':'СИНИЕ', base.x, base.y + 50);
  }
}

function drawCaptureZones() {
  if (G.settings.mode !== 2) return;
  const letters = ['A','B','C'];
  for (let i = 0; i < G.capturePoints.length; i++) {
    const cp = G.capturePoints[i]; if (!cp) continue;
    // Zone circle
    const ownerCol = cp.owner === 'red' ? '#ef4444' : cp.owner === 'blue' ? '#3b82f6' : '#64748b';
    ctx.fillStyle = ownerCol + '33';
    ctx.beginPath(); ctx.arc(cp.x, cp.y, CAPTURE_RADIUS, 0, Math.PI*2); ctx.fill();
    ctx.strokeStyle = ownerCol; ctx.lineWidth = 2; ctx.setLineDash([6,4]);
    ctx.beginPath(); ctx.arc(cp.x, cp.y, CAPTURE_RADIUS, 0, Math.PI*2); ctx.stroke();
    ctx.setLineDash([]);
    // Progress ring
    if (cp.progress !== 0) {
      const ratio = Math.abs(cp.progress) / CAPTURE_TIME;
      const col = cp.progress > 0 ? '#ef4444' : '#3b82f6';
      ctx.strokeStyle = col; ctx.lineWidth = 4;
      ctx.beginPath();
      ctx.arc(cp.x, cp.y, CAPTURE_RADIUS + 5, -Math.PI/2, -Math.PI/2 + ratio * Math.PI * 2);
      ctx.stroke();
    }
    // Letter
    ctx.fillStyle = '#fff'; ctx.font = 'bold 18px sans-serif'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(letters[i], cp.x, cp.y);
    // Score indicator
    if (cp.owner) {
      ctx.fillStyle = ownerCol; ctx.font = 'bold 10px sans-serif';
      ctx.fillText('✓', cp.x, cp.y + 16);
    }
  }
}

function drawWalls() {
  for (const w of G.walls) {
    if (!w) continue;
    if (w.hp >= 99) { // Steel
      ctx.fillStyle='#334155'; ctx.fillRect(w.x,w.y,CELL,CELL);
      ctx.strokeStyle='#64748b'; ctx.lineWidth=2; ctx.strokeRect(w.x+1,w.y+1,CELL-2,CELL-2);
      ctx.strokeStyle='#94a3b8'; ctx.lineWidth=1.5;
      ctx.beginPath(); ctx.moveTo(w.x+7,w.y+7); ctx.lineTo(w.x+33,w.y+33); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(w.x+33,w.y+7); ctx.lineTo(w.x+7,w.y+33); ctx.stroke();
    } else {
      const dmg = 1 - w.hp/(w.maxHp||1);
      const r=Math.round(160-dmg*60), g=Math.round(50-dmg*20), b=Math.round(20-dmg*10);
      ctx.fillStyle=`rgb(${r},${g},${b})`; ctx.fillRect(w.x,w.y,CELL,CELL);
      ctx.strokeStyle='#7c2d12'; ctx.lineWidth=1; ctx.strokeRect(w.x+0.5,w.y+0.5,CELL-1,CELL-1);
      ctx.beginPath(); ctx.moveTo(w.x,w.y+20); ctx.lineTo(w.x+40,w.y+20); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(w.x+20,w.y); ctx.lineTo(w.x+20,w.y+20); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(w.x+10,w.y+20); ctx.lineTo(w.x+10,w.y+40); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(w.x+30,w.y+20); ctx.lineTo(w.x+30,w.y+40); ctx.stroke();
    }
  }
}

function drawTanks() {
  for (const [id, p] of Object.entries(G.players)) {
    if (!p || p.dead || typeof p.x !== 'number') continue;
    const isMe = id === myId;
    const cls = CLASSES[p.class || 'tank'];
    const S = cls.half;
    const dx = (!isMe && !isHost && typeof p._rx === 'number') ? p._rx : p.x;
    const dy = (!isMe && !isHost && typeof p._ry === 'number') ? p._ry : p.y;
    const { dir, color, hp } = p;
    const x = dx, y = dy;

    // Shadow
    ctx.fillStyle='rgba(0,0,0,0.25)'; ctx.fillRect(x-S+4,y-S+4,S*2,S*2);
    // Treads
    ctx.fillStyle='#374151';
    if (dir==='up'||dir==='down') {
      ctx.fillRect(x-S-5,y-S,8,S*2); ctx.fillRect(x+S-3,y-S,8,S*2);
    } else {
      ctx.fillRect(x-S,y-S-5,S*2,8); ctx.fillRect(x-S,y+S-3,S*2,8);
    }
    // Body
    ctx.fillStyle=color||'#888'; ctx.fillRect(x-S,y-S,S*2,S*2);
    // Turret
    ctx.fillStyle=shadeColor(color||'#888',-30);
    ctx.beginPath(); ctx.arc(x,y,S*0.54,0,Math.PI*2); ctx.fill();
    // Barrel
    ctx.strokeStyle='#d1d5db'; ctx.lineWidth=cls.bW; ctx.lineCap='round';
    const gl = S + cls.bLen;
    ctx.beginPath();
    if (dir==='up') { ctx.moveTo(x,y); ctx.lineTo(x,y-gl); }
    else if (dir==='down') { ctx.moveTo(x,y); ctx.lineTo(x,y+gl); }
    else if (dir==='left') { ctx.moveTo(x,y); ctx.lineTo(x-gl,y); }
    else { ctx.moveTo(x,y); ctx.lineTo(x+gl,y); }
    ctx.stroke();

    // Team indicator
    if (MODES[G.settings.mode||0]?.teamMode) {
      const team = getTeam(id);
      ctx.strokeStyle = team==='red' ? '#ef4444' : '#3b82f6'; ctx.lineWidth = 2;
      ctx.strokeRect(x-S-2, y-S-2, S*2+4, S*2+4);
    }

    // My tank highlight
    if (isMe) {
      ctx.strokeStyle = inSwamp(x,y) ? '#84cc16' : '#fbbf24';
      ctx.lineWidth=2; ctx.setLineDash([5,3]);
      ctx.strokeRect(x-S-2,y-S-2,S*2+4,S*2+4); ctx.setLineDash([]);
    }

    // HP bar
    const bw = S*2;
    ctx.fillStyle='#1f2937'; ctx.fillRect(x-S,y-S-11,bw,6);
    const hpRatio = (hp||0)/cls.hp;
    ctx.fillStyle = hpRatio>=1?'#22c55e':hpRatio>=0.5?'#eab308':'#ef4444';
    ctx.fillRect(x-S,y-S-11,bw*hpRatio,6);

    // Name + class icon
    ctx.fillStyle = isMe ? '#fde68a' : '#f1f5f9';
    ctx.font='bold 11px Segoe UI'; ctx.textAlign='center';
    ctx.shadowColor='#000'; ctx.shadowBlur=5;
    ctx.fillText(`${cls.icon} ${p.name||'???'}`, x, y-S-17);
    ctx.shadowBlur=0;
  }
}

function drawBullets() {
  for (const b of Object.values(G.bullets)) {
    if (!b || typeof b.x !== 'number') continue;
    const col = G.players[b.owner]?.color || '#fbbf24';
    ctx.strokeStyle=col+'66'; ctx.lineWidth=3; ctx.lineCap='round';
    const tl=14;
    ctx.beginPath();
    if (b.dir==='up') { ctx.moveTo(b.x,b.y+tl); ctx.lineTo(b.x,b.y); }
    else if (b.dir==='down') { ctx.moveTo(b.x,b.y-tl); ctx.lineTo(b.x,b.y); }
    else if (b.dir==='left') { ctx.moveTo(b.x+tl,b.y); ctx.lineTo(b.x,b.y); }
    else { ctx.moveTo(b.x-tl,b.y); ctx.lineTo(b.x,b.y); }
    ctx.stroke();
    ctx.shadowBlur=14; ctx.shadowColor=col;
    ctx.fillStyle='#fef9c3'; ctx.beginPath(); ctx.arc(b.x,b.y,5,0,Math.PI*2); ctx.fill();
    ctx.shadowBlur=0;
  }
}

function drawParticles() {
  for (const p of G.particles) {
    const a = p.life/p.maxLife; ctx.globalAlpha=a; ctx.fillStyle=p.color;
    ctx.beginPath(); ctx.arc(p.x,p.y,p.size*a,0,Math.PI*2); ctx.fill();
  }
  ctx.globalAlpha=1;
}

function shadeColor(hex, amt) {
  if (!hex||hex.charAt(0)!=='#') return hex||'#888';
  const n=parseInt(hex.replace('#',''),16);
  const r=Math.max(0,Math.min(255,(n>>16)+amt));
  const g=Math.max(0,Math.min(255,((n>>8)&0xff)+amt));
  const b=Math.max(0,Math.min(255,(n&0xff)+amt));
  return `rgb(${r},${g},${b})`;
}

// ══════════════════════════════════════════════
//  HUD
// ══════════════════════════════════════════════
function updateHUD() {
  const me = G.players[myId]; if (!me) return;
  const myCls = CLASSES[me.class || 'tank'];
  const lives = Math.max(0, me.lives || 0);
  document.getElementById('ui-lives').innerHTML =
    '❤️'.repeat(lives) + '🖤'.repeat(Math.max(0, myCls.lives - lives));

  const mode = G.settings.mode || 0;
  if (MODES[mode]?.teamMode) {
    // Team scores
    document.getElementById('ui-scores').innerHTML =
      `<span style="color:#ef4444;font-weight:700;">🔴 ${G.teamScores.red||0}</span>` +
      `<span style="color:#475569;">|</span>` +
      `<span style="color:#3b82f6;font-weight:700;">🔵 ${G.teamScores.blue||0}</span>` +
      Object.values(G.players).sort((a,b)=>(b.score||0)-(a.score||0)).map(p =>
        `<span style="color:${p.color||'#888'};font-size:11px;">${CLASSES[p.class||'tank']?.icon||''} ${p.name}: ${p.score||0}${p.lives<=0?' 💀':''}</span>`
      ).join('');
  } else {
    const sorted = Object.values(G.players).sort((a,b)=>(b.score||0)-(a.score||0));
    document.getElementById('ui-scores').innerHTML = sorted.map(p =>
      `<span style="color:${p.color||'#888'};font-weight:${p.name===myName?900:500};">
        ${CLASSES[p.class||'tank']?.icon||''} ${p.name}: ${p.score||0}${(p.lives||0)<=0?' 💀':''}
      </span>`
    ).join('');
  }

  const bar = document.getElementById('respawn-bar');
  if (me.dead && (me.lives||0) > 0 && me.respawnAt > 0) {
    const sec = Math.max(0, Math.ceil((me.respawnAt - Date.now()) / 1000));
    document.getElementById('respawn-timer').textContent = sec;
    bar.classList.add('show');
  } else {
    bar.classList.remove('show');
  }
}
