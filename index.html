<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Танки Онлайн — School Edition v3.1</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: radial-gradient(ellipse at 50% 30%, #1a2035 0%, #0a0f1e 100%);
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
      font-family: 'Segoe UI', sans-serif; color: white; overflow: hidden;
    }
    .retro { font-family: 'Press Start 2P', cursive; }
    .screen { display: none; }
    .screen.active { display: flex; }
    .card {
      background: rgba(15,23,42,0.97); border: 1px solid #1e3a5f; border-radius: 24px;
      box-shadow: 0 25px 60px rgba(0,0,0,0.7); padding: 36px; max-width: 440px; width: 100%;
    }
    .btn {
      width: 100%; padding: 14px 20px; border-radius: 14px; font-weight: 700; font-size: 15px;
      border: none; cursor: pointer; transition: all 0.18s; color: white;
    }
    .btn:hover:not(:disabled)  { transform: translateY(-2px); filter: brightness(1.15); }
    .btn:active:not(:disabled) { transform: translateY(0); }
    .btn:disabled { opacity: 0.35; cursor: not-allowed; background: #374151 !important; }
    .btn-green  { background: linear-gradient(135deg,#059669,#10b981); }
    .btn-blue   { background: linear-gradient(135deg,#2563eb,#3b82f6); }
    .btn-orange { background: linear-gradient(135deg,#ea580c,#f97316); }
    .inp {
      width: 100%; padding: 13px 16px; background: rgba(0,0,0,0.4); border: 2px solid #1e3a5f;
      border-radius: 12px; color: white; font-size: 16px; outline: none; transition: border-color 0.2s;
    }
    .inp:focus { border-color: #f97316; }
    .inp::placeholder { color: #475569; }
    @keyframes glow {
      0%,100% { text-shadow: 0 0 8px #f97316; }
      50%     { text-shadow: 0 0 28px #f97316, 0 0 56px #f97316aa; }
    }
    .glow { animation: glow 2.5s ease-in-out infinite; }
    .pcard {
      display: flex; align-items: center; gap: 10px; padding: 10px 14px;
      background: rgba(0,0,0,0.35); border: 1px solid #1e3a5f; border-radius: 12px;
    }
    .dot  { width: 14px; height: 14px; border-radius: 50%; flex-shrink: 0; }
    .tag  { margin-left: auto; font-size: 11px; font-weight: 700; padding: 2px 8px; border-radius: 20px; }
    .tag-me   { background: #78350f; color: #fbbf24; }
    .tag-host { background: #14532d; color: #4ade80; }
    canvas {
      display: block; border-radius: 12px; border: 3px solid #1e3a5f;
      box-shadow: 0 0 50px rgba(0,0,0,0.6); background: #0f172a;
    }
    #scoreboard {
      max-width: 800px; width: 100%; background: rgba(0,0,0,0.55); border: 1px solid #1e3a5f;
      border-radius: 12px; padding: 8px 16px; display: flex; align-items: center;
      justify-content: space-between; gap: 10px; flex-wrap: wrap;
    }
    #game-overlay {
      position: absolute; inset: 0; background: rgba(0,0,0,0.88); backdrop-filter: blur(8px);
      border-radius: 12px; display: none; flex-direction: column; align-items: center;
      justify-content: center; text-align: center; padding: 40px; z-index: 10;
    }
    #game-overlay.show { display: flex; }
    #respawn-bar {
      position: absolute; bottom: 12px; left: 50%; transform: translateX(-50%);
      background: rgba(0,0,0,0.85); border: 1px solid #f97316; border-radius: 30px;
      padding: 7px 22px; font-size: 13px; color: #fbbf24; display: none;
      white-space: nowrap; z-index: 5;
    }
    #respawn-bar.show { display: block; }
    #auth-error {
      background: #7f1d1d; border: 1px solid #ef4444; border-radius: 10px;
      padding: 10px 14px; font-size: 13px; color: #fca5a5; display: none;
    }
    #auth-error.show { display: block; }
  </style>
</head>
<body>

<div id="screen-auth" class="screen active">
  <div class="card">
    <div style="text-align:center;margin-bottom:24px;">

                  padding:14px;border-radius:16px;margin-bottom:14px;">
        <svg width="34" height="34" viewBox="0 0 24 24" fill="white">
          <path d="M21 16v-2l-8-5V3.5c0-.83-.67-1.5-1.5-1.5S10 2.67 10 3.5V9l-8 5v2l8-2.5V19l-2 1.5V22l3.5-1 3.5 1v-1.5L13 19v-5.5l8 2.5z"/>
        </svg>
      </div>
      <h1 class="retro" style="color:#f97316;font-size:13px;line-height:2;margin-bottom:6px;">ТАНКИ ОНЛАЙН</h1>
      <p style="color:#475569;font-size:13px;">Школьная аркада • 2–6 игроков</p>

<!-- ЭКРАН ЛОББИ -->
<div id="screen-lobby" class="screen">
  <div class="card">
    <div style="text-align:center;margin-bottom:20px;">
      <p style="color:#64748b;font-size:11px;letter-spacing:3px;margin-bottom:6px;">КОД КОМНАТЫ</p>
      <div id="display-room-code" class="retro glow" style="color:#f97316;font-size:32px;letter-spacing:10px;">-----</div>
      <p style="color:#64748b;font-size:11px;margin-top:6px;">Назовите этот код ученикам</p>
    </div>
    <div style="margin-bottom:16px;">
      <div style="display:flex;justify-content:space-between;margin-bottom:10px;">
        <span style="color:#94a3b8;font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:1px;">Игроки</span>
        <span id="player-count-badge" style="background:#1e3a5f;color:#60a5fa;font-size:11px;font-weight:700;padding:2px 10px;border-radius:20px;">0/6</span>
      </div>
      <div id="player-list" style="display:flex;flex-direction:column;gap:8px;max-height:220px;overflow-y:auto;"></div>

    <div id="lobby-status" style="color:#64748b;font-size:13px;text-align:center;margin-bottom:12px;"></div>
    <div id="host-controls" style="display:none;">
      <button class="btn btn-orange" id="btn-start-game" disabled>⚔️ Начать бой!</button>
      <p style="color:#475569;font-size:11px;text-align:center;margin-top:8px;">Минимум 2 игрока</p>
    </div>

      <div style="font-size:28px;margin-bottom:8px;">⏳</div>
      <p style="font-weight:700;color:#e2e8f0;">Ждём учителя...</p>
      <p style="color:#475569;font-size:12px;margin-top:4px;">Игра начнётся автоматически</p>
    </div>
  </div>
</div>

<!-- ЭКРАН ИГРЫ -->
<div id="screen-game" class="screen" style="flex-direction:column;gap:10px;align-items:center;">
  <div id="scoreboard">
    <div style="font-size:12px;color:#64748b;">Комната: <span id="ui-room" style="color:#f97316;font-weight:700;"></span></div>
    <div id="ui-scores" style="display:flex;gap:16px;flex-wrap:wrap;font-size:12px;"></div>
    <div style="font-size:14px;" id="ui-lives"></div>
  </div>
  <div style="position:relative;">
    <canvas id="gameCanvas" width="800" height="600"></canvas>
    <div id="game-overlay">
      <div id="overlay-icon" style="font-size:72px;margin-bottom:16px;filter:drop-shadow(0 0 20px gold);">🏆</div>
      <h2 id="overlay-title" class="retro" style="font-size:20px;margin-bottom:12px;">ПОБЕДА!</h2>
      <p id="overlay-winner" style="font-size:20px;color:#fbbf24;font-weight:700;margin-bottom:8px;"></p>
      <div id="overlay-scores" style="color:#94a3b8;font-size:13px;margin-bottom:28px;line-height:1.8;"></div>
      <button class="btn btn-orange" id="btn-menu" style="width:auto;padding:12px 40px;font-size:15px;">🏠 В меню</button>
    </div>
    <div id="respawn-bar">💀 Вы погибли! Возрождение через <strong id="respawn-timer">3</strong>с...</div>
  </div>
  <p style="color:#334155;font-size:11px;">WASD / Стрелки — движение &nbsp;|&nbsp; Пробел — огонь</p>
</div>

<script type="module">
import { initializeApp }
  from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
import { getDatabase, ref, set, get, onValue, update, onDisconnect }
  from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

// ══════════════════════════════════════════════
//  FIREBASE CONFIG
// ══════════════════════════════════════════════
const firebaseConfig = {
  apiKey:            "AIzaSyAO-BLP_0IztO6f7tneV0U3RUaGAldVbt4",
  authDomain:        "tanks-algo.firebaseapp.com",
  databaseURL:       "https://tanks-algo-default-rtdb.firebaseio.com",
  projectId:         "tanks-algo",
  storageBucket:     "tanks-algo.firebasestorage.app",
  messagingSenderId: "1030648027213",
  appId:             "1:1030648027213:web:c99277654cc47721786404"
};
const fbApp = initializeApp(firebaseConfig);
const db    = getDatabase(fbApp);

// ══════════════════════════════════════════════
//  CONSTANTS
// ══════════════════════════════════════════════
const W          = 800;
const H          = 600;
const HALF       = 18;
const SPEED      = 3;
const BSPEED     = 8;
const SHOOT_CD   = 500;
const MAX_HP     = 3;
const MAX_LIVES  = 3;
const RESPAWN_MS = 3000;
const INPUT_MS   = 50;
const HOST_TICK  = 1000 / 30;

const SPAWNS = [
  { x:  60, y:  60, dir: 'right' },
  { x: 740, y: 540, dir: 'left'  },
  { x: 740, y:  60, dir: 'left'  },
  { x:  60, y: 540, dir: 'right' },
  { x: 400, y:  45, dir: 'down'  },
  { x: 400, y: 555, dir: 'up'    },
];
const COLORS = ['#22c55e','#ef4444','#3b82f6','#eab308','#a855f7','#f97316'];

// ══════════════════════════════════════════════
//  STATE
// ══════════════════════════════════════════════
let myId        = null;
let myName      = '';
let roomCode    = null;
let isHost      = false;
let gameRunning = false;
let gameOverShown = false;
let roomRef     = null;
let bulletSeq   = 0;

// Game state (authoritative on host, synced to clients via Firebase)
const G = {
  players:   {},
  bullets:   {},
  walls:     [],
  particles: []
};

// Input state (sent to Firebase by each client)
const myKeys  = { up:false, down:false, left:false, right:false };
let myShootTs = 0;    // timestamp of last shoot request
let lastInputSend = 0;

// Host-side: collected input from all players
const hostInput     = {};
const hostLastShoot = {};
let lastHostTick    = 0;

const canvas = document.getElementById('gameCanvas');
const ctx    = canvas.getContext('2d');

// ══════════════════════════════════════════════
//  KEYBOARD
// ══════════════════════════════════════════════
window.addEventListener('keydown', e => {
  if (!gameRunning) return;
  let handled = true;
  switch (e.code) {
    case 'ArrowUp':    case 'KeyW': myKeys.up    = true; break;
    case 'ArrowDown':  case 'KeyS': myKeys.down  = true; break;
    case 'ArrowLeft':  case 'KeyA': myKeys.left  = true; break;
    case 'ArrowRight': case 'KeyD': myKeys.right = true; break;
    case 'Space':
      // Set shoot timestamp (host will compare to detect new shots)
      const now = Date.now();
      if (now - myShootTs >= SHOOT_CD) {
        myShootTs = now;
      }
      break;
    default: handled = false;
  }
  if (handled) e.preventDefault();
});
window.addEventListener('keyup', e => {
  switch (e.code) {
    case 'ArrowUp':    case 'KeyW': myKeys.up    = false; break;
    case 'ArrowDown':  case 'KeyS': myKeys.down  = false; break;
    case 'ArrowLeft':  case 'KeyA': myKeys.left  = false; break;
    case 'ArrowRight': case 'KeyD': myKeys.right = false; break;
  }
});

// ══════════════════════════════════════════════
//  UI HELPERS
// ══════════════════════════════════════════════
function showScreen(name) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-' + name).classList.add('active');
}
function showError(msg) {
  const el = document.getElementById('auth-error');
  el.textContent = msg; el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 4500);
}

// ══════════════════════════════════════════════
//  MAP GENERATION
// ══════════════════════════════════════════════
function generateWalls() {
  const CELL = 40, cells = [];
  for (let c = 1; c < W/CELL-1; c++)
    for (let r = 1; r < H/CELL-1; r++) {
      const cx = c*CELL+CELL/2, cy = r*CELL+CELL/2;
      const nearSpawn = SPAWNS.some(s => Math.abs(s.x-cx)<100 && Math.abs(s.y-cy)<100);
      const inCenter  = cx>340 && cx<460 && cy>240 && cy<360;
      if (!nearSpawn && !inCenter) cells.push({ x: c*CELL, y: r*CELL });
    }
  // Fisher-Yates shuffle
  for (let i = cells.length-1; i > 0; i--) {
    const j = Math.floor(Math.random()*(i+1));
    [cells[i], cells[j]] = [cells[j], cells[i]];
  }
  return cells.slice(0, 50).map(c => { // Увеличено количество препятствий до 50
    const steel = Math.random() < 0.22;
    return { x:c.x, y:c.y, hp: steel?99:1, maxHp: steel?99:1 };
  });
}

// ══════════════════════════════════════════════
//  COLLISION HELPERS
// ══════════════════════════════════════════════
function hitsWall(nx, ny) {
  for (const w of G.walls) {
    if (!w) continue;
    if (nx+HALF > w.x+3 && nx-HALF < w.x+37 &&
        ny+HALF > w.y+3 && ny-HALF < w.y+37) return true;
  }
  return false;
}
function outBounds(nx, ny) {
  return nx-HALF < 0 || nx+HALF > W || ny-HALF < 0 || ny+HALF > H;
}

// ══════════════════════════════════════════════
//  PARTICLES (local visual only)
// ══════════════════════════════════════════════
function spawnExplosion(x, y, color, count) {
  for (let i = 0; i < count; i++) {
    const a = Math.random()*Math.PI*2, sp = 1+Math.random()*4;
    G.particles.push({
      x, y, vx:Math.cos(a)*sp, vy:Math.sin(a)*sp,
      life:20+Math.random()*20, maxLife:40,
      color: Math.random()<0.4 ? '#fef9c3' : color,
      size: 2+Math.random()*4
    });
  }
}
function spawnDebris(x, y) {
  for (let i = 0; i < 8; i++) {
    const a = Math.random()*Math.PI*2, sp = 1+Math.random()*2;
    G.particles.push({
      x:x+20, y:y+20, vx:Math.cos(a)*sp, vy:Math.sin(a)*sp,
      life:15+Math.random()*15, maxLife:30, color:'#92400e', size:2+Math.random()*3
    });
  }
}
function tickParticles() {
  for (let i = G.particles.length-1; i >= 0; i--) {
    const p = G.particles[i];
    p.x += p.vx; p.y += p.vy; p.vx *= 0.96; p.vy *= 0.96; p.life--;
    if (p.life <= 0) G.particles.splice(i, 1);
  }
}

// ══════════════════════════════════════════════
//  SOUNDS (Web Audio API)
// ══════════════════════════════════════════════
let audioCtx = null;
function snd(type) {
  try {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const o = audioCtx.createOscillator(), g = audioCtx.createGain();
    o.connect(g); g.connect(audioCtx.destination);
    const t = audioCtx.currentTime;
    if (type === 'shoot') {
      o.type='square'; o.frequency.setValueAtTime(600,t);
      o.frequency.exponentialRampToValueAtTime(200,t+0.08);
      g.gain.setValueAtTime(0.08,t); g.gain.exponentialRampToValueAtTime(0.001,t+0.08);
      o.start(t); o.stop(t+0.08);
    } else if (type === 'hit') {
      o.type='sawtooth'; o.frequency.setValueAtTime(300,t);
      o.frequency.exponentialRampToValueAtTime(80,t+0.15);
      g.gain.setValueAtTime(0.1,t); g.gain.exponentialRampToValueAtTime(0.001,t+0.15);
      o.start(t); o.stop(t+0.15);
    } else if (type === 'explode') {
      o.type='sawtooth'; o.frequency.setValueAtTime(150,t);
      o.frequency.exponentialRampToValueAtTime(30,t+0.35);
      g.gain.setValueAtTime(0.15,t); g.gain.exponentialRampToValueAtTime(0.001,t+0.35);
      o.start(t); o.stop(t+0.35);
    } else if (type === 'respawn') {
      o.type='sine'; o.frequency.setValueAtTime(400,t);
      o.frequency.exponentialRampToValueAtTime(800,t+0.12);
      g.gain.setValueAtTime(0.06,t); g.gain.exponentialRampToValueAtTime(0.001,t+0.12);
      o.start(t); o.stop(t+0.12);
    }
  } catch(e) {}
}

// ══════════════════════════════════════════════
//  INPUT SENDING (every client → Firebase)
//  Writes to: rooms/{code}/input/{myId}
// ══════════════════════════════════════════════
function sendInput() {
  if (!gameRunning || !myId || !roomCode) return;
  const now = Date.now();
  if (now - lastInputSend < INPUT_MS) return;
  lastInputSend = now;

  set(ref(db, `rooms/${roomCode}/input/${myId}`), {
    u: myKeys.up,
    d: myKeys.down,
    l: myKeys.left,
    r: myKeys.right,
    s: myShootTs   // timestamp of last shoot request
  });
}

// ══════════════════════════════════════════════
//  AUTH — CREATE ROOM
// ══════════════════════════════════════════════
document.getElementById('btn-create').onclick = async () => {
  myName = document.getElementById('player-name').value.trim();
  if (!myName) return showError('Введите имя!');

  roomCode = Math.random().toString(36).substring(2,7).toUpperCase();
  isHost   = true;
  myId     = 'p1';
  roomRef  = ref(db, 'rooms/' + roomCode);

  const sp = SPAWNS[0];
  await set(roomRef, {
    status: 'waiting',
    walls:  generateWalls(),
    bullets: {},
    input:  {},
    players: {
      p1: {
        name:myName, color:COLORS[0],
        x:sp.x, y:sp.y, dir:sp.dir,
        hp:MAX_HP, lives:MAX_LIVES, score:0,
        dead:false, respawnAt:0
      }
    }
  });
  onDisconnect(roomRef).remove();

  // Host listens to input from ALL players
  onValue(ref(db, `rooms/${roomCode}/input`), snap => {
    const data = snap.val();
    if (!data) return;
    for (const [pid, inp] of Object.entries(data)) {
      if (inp) hostInput[pid] = inp;
    }
  });

  openLobby();
};

// ══════════════════════════════════════════════
//  AUTH — JOIN ROOM
// ══════════════════════════════════════════════
document.getElementById('btn-join').onclick = async () => {
  myName = document.getElementById('player-name').value.trim();
  const code = document.getElementById('room-code-input').value.toUpperCase().trim();
  if (!myName)           return showError('Введите имя!');
  if (code.length !== 5) return showError('Код — ровно 5 символов!');

  roomCode = code;
  roomRef  = ref(db, 'rooms/' + roomCode);
  const snap = await get(roomRef);
  const data = snap.val();
  if (!data)                     return showError('Комната не найдена!');
  if (data.status === 'playing') return showError('Игра уже идёт!');

  const pKeys = Object.keys(data.players || {});
  if (pKeys.length >= 6) return showError('Комната заполнена (6/6)!');

  const idx = pKeys.length;
  myId      = 'p' + (idx + 1);
  const sp  = SPAWNS[idx < SPAWNS.length ? idx : 0];

  await update(ref(db, `rooms/${roomCode}/players`), {
    [myId]: {
      name:myName, color:COLORS[idx],
      x:sp.x, y:sp.y, dir:sp.dir,
      hp:MAX_HP, lives:MAX_LIVES, score:0,
      dead:false, respawnAt:0
    }
  });
  onDisconnect(ref(db, `rooms/${roomCode}/players/${myId}`)).remove();
  openLobby();
};

// ══════════════════════════════════════════════
//  LOBBY
// ══════════════════════════════════════════════
function openLobby() {
  document.getElementById('display-room-code').textContent = roomCode;
  document.getElementById('ui-room').textContent           = roomCode;
  showScreen('lobby');
  document.getElementById('host-controls').style.display = isHost ? '' : 'none';
  document.getElementById('student-wait').style.display  = isHost ? 'none' : '';

  // Single listener on the entire room
  onValue(roomRef, snap => {
    const data = snap.val();
    if (!data) return;

    // ---- Sync state ----
    // Host is authoritative during gameplay — skip overwriting its local state
    if (!(isHost && gameRunning)) {
      G.players = data.players || {};
      G.walls   = data.walls   || [];
      G.bullets = data.bullets || {};
    }

    // ---- Lobby UI ----
    const entries = Object.entries(data.players || {});
    document.getElementById('player-count-badge').textContent = `${entries.length}/6`;
    document.getElementById('player-list').innerHTML = entries.map(([id,p]) => `
      <div class="pcard">
        <div class="dot" style="background:${p.color}"></div>
        <span style="font-weight:600;">${p.name}</span>
        ${id===myId ? '<span class="tag tag-me">ВЫ</span>' : ''}
        ${id==='p1' ? '<span class="tag tag-host">👑 Учитель</span>' : ''}
      </div>
    `).join('');

    if (isHost) {
      document.getElementById('btn-start-game').disabled = entries.length < 2;
      document.getElementById('lobby-status').textContent =
        entries.length < 2 ? '⏳ Ждём хотя бы одного ученика...' : `✅ Готово! ${entries.length} игроков`;
    }

    // ---- Game start ----
    if (data.status === 'playing' && !gameRunning) {
      gameRunning   = true;
      gameOverShown = false;
      G.particles   = [];
      // Host takes a local copy to work with
      if (isHost) {
        G.players = JSON.parse(JSON.stringify(data.players || {}));
        G.walls   = JSON.parse(JSON.stringify(data.walls   || []));
        G.bullets = {};
      }
      showScreen('game');
      requestAnimationFrame(gameLoop);
    }

    // ---- Game end (clients) ----
    if (data.status === 'ended' && !gameOverShown) {
      // Make sure we have final player data
      G.players = data.players || G.players;
      showGameOver(data.winner);
    }
  });
}

document.getElementById('btn-start-game').onclick = () =>
  update(roomRef, { status: 'playing' });

document.getElementById('btn-menu').onclick = () => location.reload();

// ══════════════════════════════════════════════
//  GAME LOOP
// ══════════════════════════════════════════════
function gameLoop(ts) {
  if (!gameRunning) return;
  requestAnimationFrame(gameLoop);

  sendInput();
  if (isHost) hostTick(ts);
  tickParticles();
  render();
  updateHUD();
}

// ══════════════════════════════════════════════
//  HOST TICK — all physics runs here (~30 FPS)
//
//  KEY FIX: Uses MULTI-PATH updates like
//    "players/p1/x": 100
//  instead of
//    "players": { p1: { x: 100 } }   ← THIS DELETES ALL OTHER FIELDS!
// ══════════════════════════════════════════════
function hostTick(ts) {
  if (ts - lastHostTick < HOST_TICK) return;
  lastHostTick = ts;

  const now = Date.now();
  // All changes go into ONE flat object with paths like "players/p1/x"
  const fb = {};

  // ── 1. Move tanks based on input ──────────────────────
  for (const [pid, p] of Object.entries(G.players)) {
    if (p.dead) continue;

    const inp = hostInput[pid];
    if (!inp) continue;

    const pSpeed = (pid === 'p1') ? SPEED : SPEED * 1.25; // Ученики (не p1) двигаются на 25% быстрее
    let nx = p.x, ny = p.y, ndir = p.dir, moved = false;
    if      (inp.u) { ny -= pSpeed; ndir = 'up';    moved = true; }
    else if (inp.d) { ny += pSpeed; ndir = 'down';  moved = true; }
    else if (inp.l) { nx -= pSpeed; ndir = 'left';  moved = true; }
    else if (inp.r) { nx += pSpeed; ndir = 'right'; moved = true; }

    if (moved && !outBounds(nx, ny) && !hitsWall(nx, ny)) {
      p.x = nx; p.y = ny; p.dir = ndir;
      fb[`players/${pid}/x`]   = nx;
      fb[`players/${pid}/y`]   = ny;
      fb[`players/${pid}/dir`] = ndir;
    }

    // Shooting: new shot if inp.s timestamp is newer than last processed
    if (inp.s && inp.s > (hostLastShoot[pid] || 0)) {
      hostLastShoot[pid] = inp.s;
      const off = HALF + 14;
      let bx = p.x, by = p.y;
      if      (p.dir === 'up')    by -= off;
      else if (p.dir === 'down')  by += off;
      else if (p.dir === 'left')  bx -= off;
      else                        bx += off;

      const bId = 'b' + (++bulletSeq);
      const bullet = { x:bx, y:by, dir:p.dir, owner:pid };
      G.bullets[bId] = bullet;
      fb[`bullets/${bId}`] = bullet;
      snd('shoot');
    }
  }

  // ── 2. Respawn dead players ───────────────────────────
  for (const [pid, p] of Object.entries(G.players)) {
    if (p.dead && p.lives > 0 && p.respawnAt > 0 && now >= p.respawnAt) {
      const idx = parseInt(pid.replace('p','')) - 1;
      const sp  = SPAWNS[idx < SPAWNS.length ? idx : 0];
      p.dead = false; p.hp = MAX_HP; p.x = sp.x; p.y = sp.y; p.dir = sp.dir; p.respawnAt = 0;
      fb[`players/${pid}/dead`]      = false;
      fb[`players/${pid}/hp`]        = MAX_HP;
      fb[`players/${pid}/x`]         = sp.x;
      fb[`players/${pid}/y`]         = sp.y;
      fb[`players/${pid}/dir`]       = sp.dir;
      fb[`players/${pid}/respawnAt`] = 0;
      snd('respawn');
    }
  }

  // ── 3. Move bullets & check collisions ────────────────
  let wallsDirty = false;
  const bulletsToDelete = [];

  for (const [bId, b] of Object.entries(G.bullets)) {
    if (!b) { bulletsToDelete.push(bId); continue; }

    let { x, y, dir, owner } = b;
    const bSpeed = (owner === 'p1') ? BSPEED : BSPEED * 1.35; // Снаряды учеников на 35% быстрее
    if      (dir === 'up')    y -= bSpeed;
    else if (dir === 'down')  y += bSpeed;
    else if (dir === 'left')  x -= bSpeed;
    else                      x += bSpeed;

    // Out of bounds
    if (x < 0 || x > W || y < 0 || y > H) {
      bulletsToDelete.push(bId);
      continue;
    }

    // Wall collision
    let hitWall = false;
    for (let i = 0; i < G.walls.length; i++) {
      const w = G.walls[i];
      if (!w) continue;
      if (x > w.x+3 && x < w.x+37 && y > w.y+3 && y < w.y+37) {
        if (w.hp < 99) {
          w.hp--;
          if (w.hp <= 0) { G.walls[i] = null; spawnDebris(w.x, w.y); }
          wallsDirty = true;
        }
        hitWall = true;
        wallsDirty = true;
        break;
      }
    }
    if (hitWall) { bulletsToDelete.push(bId); continue; }

    // Tank collision
    let hitPid = null;
    for (const [pid, p] of Object.entries(G.players)) {
      if (pid === owner || p.dead) continue;
      if (Math.hypot(p.x - x, p.y - y) < HALF + 6) { hitPid = pid; break; }
    }
    if (hitPid) {
      const t = G.players[hitPid];
      const newHp = (t.hp || 1) - 1;
      if (newHp <= 0) {
        const nl = (t.lives || 1) - 1;
        t.hp = 0; t.lives = nl; t.dead = true;
        t.respawnAt = nl > 0 ? now + RESPAWN_MS : 0;
        fb[`players/${hitPid}/hp`]        = 0;
        fb[`players/${hitPid}/lives`]     = nl;
        fb[`players/${hitPid}/dead`]      = true;
        fb[`players/${hitPid}/respawnAt`] = t.respawnAt;
        // +1 score for shooter
        const sh = G.players[owner];
        if (sh) {
          sh.score = (sh.score || 0) + 1;
          fb[`players/${owner}/score`] = sh.score;
        }
        spawnExplosion(t.x, t.y, t.color || '#ff0000', 25);
        snd('explode');
      } else {
        t.hp = newHp;
        fb[`players/${hitPid}/hp`] = newHp;
        spawnExplosion(x, y, '#fef9c3', 8);
        snd('hit');
      }
      bulletsToDelete.push(bId);
      continue;
    }

    // Bullet flies on — update position
    b.x = x; b.y = y;
    fb[`bullets/${bId}`] = { x, y, dir, owner };
  }

  // Remove dead bullets
  for (const bId of bulletsToDelete) {
    delete G.bullets[bId];
    fb[`bullets/${bId}`] = null;
  }

  // Walls changed
  if (wallsDirty) {
    const cleaned = G.walls.filter(Boolean);
    G.walls = cleaned;
    fb['walls'] = cleaned;
  }

  // ── 4. Single Firebase write ──────────────────────────
  if (Object.keys(fb).length > 0) {
    update(ref(db, `rooms/${roomCode}`), fb);
  }

  // ── 5. Check end game ─────────────────────────────────
  checkEndGame();
}

// ══════════════════════════════════════════════
//  END GAME
// ══════════════════════════════════════════════
function checkEndGame() {
  if (gameOverShown) return;
  const all = Object.values(G.players);
  if (all.length < 2) return;
  const alive = all.filter(p => p.lives > 0);
  if (alive.length > 1) return;

  gameRunning   = false;
  gameOverShown = true;
  const winner = alive[0] || null;
  update(roomRef, { status:'ended', winner: winner ? winner.name : null });
  showGameOver(winner ? winner.name : null);
}

function showGameOver(winnerName) {
  gameRunning   = false;
  gameOverShown = true;
  const isWin = winnerName && winnerName === myName;
  document.getElementById('overlay-icon').textContent   = isWin ? '🏆' : '💀';
  document.getElementById('overlay-title').textContent  = isWin ? 'ПОБЕДА!' : 'КОНЕЦ БОЯ';
  document.getElementById('overlay-winner').textContent = winnerName ? `Победитель: ${winnerName}` : 'Все выбыли — ничья!';
  document.getElementById('overlay-scores').innerHTML   =
    Object.values(G.players)
      .sort((a,b) => (b.score||0) - (a.score||0))
      .map(p => `${p.name}: ${p.score||0} очков`)
      .join('<br>');
  document.getElementById('game-overlay').classList.add('show');
  if (isHost) setTimeout(() => set(roomRef, null), 60000);
}

// ══════════════════════════════════════════════
//  RENDERING
// ══════════════════════════════════════════════
function render() {
  ctx.fillStyle = '#0f172a';
  ctx.fillRect(0, 0, W, H);

  // Grid
  ctx.strokeStyle = '#1a2640'; ctx.lineWidth = 1;
  for (let x = 0; x <= W; x += 40) {
    ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,H); ctx.stroke();
  }
  for (let y = 0; y <= H; y += 40) {
    ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(W,y); ctx.stroke();
  }

  drawWalls();
  drawTanks();
  drawBullets();
  drawParticles();
}

function drawWalls() {
  for (const w of G.walls) {
    if (!w) continue;
    if (w.hp >= 99) {
      // Steel
      ctx.fillStyle = '#334155'; ctx.fillRect(w.x+2, w.y+2, 36, 36);
      ctx.strokeStyle = '#475569'; ctx.lineWidth = 2; ctx.strokeRect(w.x+2, w.y+2, 36, 36);
      ctx.strokeStyle = '#4b5563'; ctx.lineWidth = 1.5;
      ctx.beginPath(); ctx.moveTo(w.x+8, w.y+8); ctx.lineTo(w.x+32, w.y+32); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(w.x+32, w.y+8); ctx.lineTo(w.x+8, w.y+32); ctx.stroke();
    } else {
      // Brick
      const dmg = 1 - w.hp / (w.maxHp || 1);
      const r = Math.round(160-dmg*60), g = Math.round(50-dmg*20), b = Math.round(20-dmg*10);
      ctx.fillStyle = `rgb(${r},${g},${b})`; ctx.fillRect(w.x+2, w.y+2, 36, 36);
      ctx.strokeStyle = '#7c2d12'; ctx.lineWidth = 1; ctx.strokeRect(w.x+2, w.y+2, 36, 36);
      ctx.beginPath(); ctx.moveTo(w.x+2, w.y+21); ctx.lineTo(w.x+38, w.y+21); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(w.x+21, w.y+2); ctx.lineTo(w.x+21, w.y+21); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(w.x+11, w.y+21); ctx.lineTo(w.x+11, w.y+38); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(w.x+31, w.y+21); ctx.lineTo(w.x+31, w.y+38); ctx.stroke();
    }
  }
}

function drawTanks() {
  for (const [id, p] of Object.entries(G.players)) {
    if (!p || p.dead) continue;
    if (typeof p.x !== 'number' || typeof p.y !== 'number') continue;

    const { x, y, dir, color, hp } = p;
    const S = HALF, isMe = id === myId;

    // Shadow
    ctx.fillStyle = 'rgba(0,0,0,0.25)';
    ctx.fillRect(x-S+4, y-S+4, S*2, S*2);

    // Treads
    ctx.fillStyle = '#374151';
    if (dir === 'up' || dir === 'down') {
      ctx.fillRect(x-S-5, y-S, 8, S*2);
      ctx.fillRect(x+S-3, y-S, 8, S*2);
    } else {
      ctx.fillRect(x-S, y-S-5, S*2, 8);
      ctx.fillRect(x-S, y+S-3, S*2, 8);
    }

    // Body
    ctx.fillStyle = color || '#888';
    ctx.fillRect(x-S, y-S, S*2, S*2);

    // Turret
    ctx.fillStyle = shadeColor(color || '#888', -30);
    ctx.beginPath(); ctx.arc(x, y, S*0.54, 0, Math.PI*2); ctx.fill();

    // Barrel
    ctx.strokeStyle = '#d1d5db'; ctx.lineWidth = 5; ctx.lineCap = 'round';
    const gl = S + 13;
    ctx.beginPath();
    if      (dir === 'up')    { ctx.moveTo(x, y); ctx.lineTo(x, y-gl); }
    else if (dir === 'down')  { ctx.moveTo(x, y); ctx.lineTo(x, y+gl); }
    else if (dir === 'left')  { ctx.moveTo(x, y); ctx.lineTo(x-gl, y); }
    else                      { ctx.moveTo(x, y); ctx.lineTo(x+gl, y); }
    ctx.stroke();

    // My tank highlight
    if (isMe) {
      ctx.strokeStyle = '#fbbf24'; ctx.lineWidth = 2;
      ctx.setLineDash([5,3]);
      ctx.strokeRect(x-S-2, y-S-2, S*2+4, S*2+4);
      ctx.setLineDash([]);
    }

    // HP bar
    const bw = S*2;
    ctx.fillStyle = '#1f2937'; ctx.fillRect(x-S, y-S-11, bw, 6);
    const hpRatio = (hp || 0) / MAX_HP;
    ctx.fillStyle = hpRatio >= 1 ? '#22c55e' : hpRatio >= 0.5 ? '#eab308' : '#ef4444';
    ctx.fillRect(x-S, y-S-11, bw * hpRatio, 6);

    // Name
    ctx.fillStyle = isMe ? '#fde68a' : '#f1f5f9';
    ctx.font = 'bold 11px Segoe UI'; ctx.textAlign = 'center';
    ctx.shadowColor = '#000'; ctx.shadowBlur = 5;
    ctx.fillText(p.name || '???', x, y-S-17);
    ctx.shadowBlur = 0;
  }
}

function drawBullets() {
  for (const b of Object.values(G.bullets)) {
    if (!b || typeof b.x !== 'number') continue;
    const col = G.players[b.owner]?.color || '#fbbf24';

    // Trail
    ctx.strokeStyle = col + '66'; ctx.lineWidth = 3; ctx.lineCap = 'round';
    const tl = 14;
    ctx.beginPath();
    if      (b.dir === 'up')    { ctx.moveTo(b.x, b.y+tl); ctx.lineTo(b.x, b.y); }
    else if (b.dir === 'down')  { ctx.moveTo(b.x, b.y-tl); ctx.lineTo(b.x, b.y); }
    else if (b.dir === 'left')  { ctx.moveTo(b.x+tl, b.y); ctx.lineTo(b.x, b.y); }
    else                        { ctx.moveTo(b.x-tl, b.y); ctx.lineTo(b.x, b.y); }
    ctx.stroke();

    // Core glow
    ctx.shadowBlur = 14; ctx.shadowColor = col;
    ctx.fillStyle = '#fef9c3';
    ctx.beginPath(); ctx.arc(b.x, b.y, 5, 0, Math.PI*2); ctx.fill();
    ctx.shadowBlur = 0;
  }
}

function drawParticles() {
  for (const p of G.particles) {
    const a = p.life / p.maxLife;
    ctx.globalAlpha = a;
    ctx.fillStyle = p.color;
    ctx.beginPath(); ctx.arc(p.x, p.y, p.size*a, 0, Math.PI*2); ctx.fill();
  }
  ctx.globalAlpha = 1;
}

function shadeColor(hex, amt) {
  if (!hex || hex.charAt(0) !== '#') return hex || '#888';
  const n = parseInt(hex.replace('#',''), 16);
  const r = Math.max(0, Math.min(255, (n >> 16) + amt));
  const g = Math.max(0, Math.min(255, ((n >> 8) & 0xff) + amt));
  const b = Math.max(0, Math.min(255, (n & 0xff) + amt));
  return `rgb(${r},${g},${b})`;
}

// ══════════════════════════════════════════════
//  HUD
// ══════════════════════════════════════════════
function updateHUD() {
  const me = G.players[myId];
  if (!me) return;

  const lives = Math.max(0, me.lives || 0);
  document.getElementById('ui-lives').innerHTML =
    '❤️'.repeat(lives) + '🖤'.repeat(Math.max(0, MAX_LIVES - lives));

  const sorted = Object.values(G.players).sort((a,b) => (b.score||0) - (a.score||0));
  document.getElementById('ui-scores').innerHTML = sorted.map(p =>
    `<span style="color:${p.color || '#888'};font-weight:${p.name===myName?900:500};">
      ${p.name}: ${p.score||0}${(p.lives||0)<=0?' 💀':''}
    </span>`
  ).join('');

  // Respawn timer
  const bar = document.getElementById('respawn-bar');
  if (me.dead && (me.lives||0) > 0 && me.respawnAt > 0) {
    const sec = Math.max(0, Math.ceil((me.respawnAt - Date.now()) / 1000));
    document.getElementById('respawn-timer').textContent = sec;
    bar.classList.add('show');
  } else {
    bar.classList.remove('show');
  }
}
