<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Battle City Online - Pro Edition</title>
  <!-- Подключаем Tailwind CSS для современного дизайна без установки -->
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
    body { background-color: #0f172a; color: white; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; overflow: hidden; }
    .retro-font { font-family: 'Press Start 2P', cursive; }
    canvas { image-rendering: pixelated; box-shadow: 0 0 50px rgba(0,0,0,0.5); }
    .screen { display: none; }
    .screen.active { display: flex; }
    .overlay { background: rgba(0,0,0,0.85); backdrop-filter: blur(4px); }
  </style>
</head>
<body class="h-screen w-screen flex items-center justify-center">

  <!-- ЭКРАН 1: ВХОД И ИМЯ -->
  <div id="screen-auth" class="screen active flex-col items-center gap-6 p-8 bg-slate-800 rounded-2xl shadow-2xl border-2 border-slate-700 max-w-md w-full">
    <h1 class="retro-font text-orange-500 text-2xl text-center mb-4 leading-relaxed">БИТВА ТАНКОВ</h1>
    <input type="text" id="player-name" placeholder="Ваше имя..." class="w-full p-3 bg-slate-900 border-2 border-slate-600 rounded-lg text-white text-center focus:border-orange-500 outline-none transition-all">
    <div class="flex flex-col w-full gap-3">
      <button id="btn-create" class="bg-green-600 hover:bg-green-500 text-white font-bold py-3 px-6 rounded-lg transition-all transform hover:scale-105">Создать комнату (Учитель)</button>
      <div class="flex gap-2">
        <input type="text" id="room-code-input" placeholder="Код" maxlength="5" class="w-1/3 p-3 bg-slate-900 border-2 border-slate-600 rounded-lg text-center uppercase font-bold outline-none focus:border-blue-500">
        <button id="btn-join" class="w-2/3 bg-blue-600 hover:bg-blue-500 text-white font-bold py-3 px-6 rounded-lg transition-all transform hover:scale-105">Присоединиться</button>
      </div>
    </div>
  </div>

  <!-- ЭКРАН 2: ЛОББИ -->
  <div id="screen-lobby" class="screen flex-col items-center gap-6 p-8 bg-slate-800 rounded-2xl shadow-2xl border-2 border-slate-700 max-w-md w-full">
    <h2 class="retro-font text-xl text-center">ЛОББИ</h2>
    <div class="text-center">
      <p class="text-slate-400 mb-1">Код комнаты:</p>
      <div id="display-room-code" class="text-4xl font-bold text-green-400 tracking-widest">-----</div>
    </div>
    
    <div class="w-full">
      <p class="text-slate-400 mb-3 text-center">Игроки (<span id="player-count">0</span>/6):</p>
      <ul id="player-list" class="space-y-2 max-h-48 overflow-y-auto pr-2">
        <!-- Сюда будут добавляться игроки -->
      </ul>
    </div>

    <button id="btn-start-game" disabled class="w-full bg-orange-600 disabled:bg-slate-600 disabled:opacity-50 hover:bg-orange-500 text-white font-bold py-4 rounded-xl transition-all text-lg uppercase">Начать бой!</button>
  </div>

  <!-- ЭКРАН 3: ИГРА -->
  <div id="screen-game" class="screen flex-col items-center relative">
    <canvas id="gameCanvas" width="800" height="600" class="rounded-lg border-4 border-slate-600 bg-black"></canvas>
    <div class="mt-4 text-slate-400 text-sm flex gap-6">
      <span><b class="text-white">WASD / Стрелки</b> — Движение</span>
      <span><b class="text-white">Пробел</b> — Огонь</span>
    </div>
    
    <!-- Оверлей победы/поражения -->
    <div id="game-overlay" class="hidden absolute inset-0 overlay rounded-lg flex flex-col items-center justify-center text-center p-6">
      <div id="overlay-icon" class="text-6xl mb-4">🏆</div>
      <h2 id="overlay-title" class="retro-font text-3xl mb-2">ПОБЕДА!</h2>
      <p id="overlay-message" class="text-xl mb-8 text-slate-300">Вы уничтожили всех врагов</p>
      <button onclick="location.reload()" class="bg-white text-black font-bold py-2 px-6 rounded-full hover:bg-slate-200 transition-all">В меню</button>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
    import { getDatabase, ref, set, onValue, update, remove, onDisconnect, push } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

    // =========================================================================
    // 1. НАСТРОЙКИ FIREBASE (ВСТАВЬТЕ СВОИ ДАННЫЕ СЮДА)
    // =========================================================================
    const firebaseConfig = {
      apiKey: "ВАШ_API_KEY",
      authDomain: "ВАШ_PROJECT.firebaseapp.com",
      databaseURL: "https://ВАШ_PROJECT.firebaseio.com",
      projectId: "ВАШ_PROJECT",
      storageBucket: "ВАШ_PROJECT.appspot.com",
      messagingSenderId: "...",
      appId: "..."
    };
    // =========================================================================

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    // Состояние игры
    let myId = null;
    let myName = "";
    let roomCode = null;
    let isHost = false;
    let gameRunning = false;
    let roomRef = null;
    const state = { players: {}, bullets: {}, walls: [] };

    // Элементы интерфейса
    const screens = {
      auth: document.getElementById('screen-auth'),
      lobby: document.getElementById('screen-lobby'),
      game: document.getElementById('screen-game')
    };

    function showScreen(name) {
      Object.values(screens).forEach(s => s.classList.remove('active'));
      screens[name].classList.add('active');
    }

    // Цвета для игроков
    const PLAYER_COLORS = ['#2ecc71', '#e74c3c', '#3498db', '#f1c40f', '#9b59b6', '#e67e22'];

    // --- ЛОГИКА ВХОДА ---

    document.getElementById('btn-create').onclick = async () => {
      myName = document.getElementById('player-name').value.trim();
      if (!myName) return alert("Введите имя!");
      
      roomCode = Math.random().toString(36).substring(2, 7).toUpperCase();
      isHost = true;
      myId = 'p1';
      roomRef = ref(db, 'rooms/' + roomCode);

      const initialWalls = [];
      for(let i=0; i<15; i++) {
        initialWalls.push({ 
          x: Math.floor(Math.random() * 15 + 5) * 40, 
          y: Math.floor(Math.random() * 10 + 5) * 40, 
          hp: Math.random() > 0.8 ? 3 : 1 
        });
      }

      await set(roomRef, {
        players: { p1: { name: myName, x: 100, y: 300, dir: 'right', hp: 5, color: PLAYER_COLORS[0] } },
        walls: initialWalls,
        status: 'waiting'
      });

      onDisconnect(roomRef).remove();
      document.getElementById('display-room-code').innerText = roomCode;
      showScreen('lobby');
      listenToRoom();
    };

    document.getElementById('btn-join').onclick = async () => {
      myName = document.getElementById('player-name').value.trim();
      const code = document.getElementById('room-code-input').value.toUpperCase().trim();
      if (!myName || !code) return alert("Введите имя и код комнаты!");

      roomCode = code;
      roomRef = ref(db, 'rooms/' + roomCode);
      
      // Проверяем существование комнаты
      onValue(roomRef, async (snapshot) => {
        const data = snapshot.val();
        if (!data) {
          alert("Комната не найдена!");
          location.reload();
          return;
        }
        if (!myId) {
          const playerKeys = Object.keys(data.players || {});
          if (playerKeys.length >= 6) {
            alert("Комната полна!");
            location.reload();
            return;
          }
          myId = 'p' + (playerKeys.length + 1);
          const color = PLAYER_COLORS[playerKeys.length] || '#fff';
          
          await update(ref(db, `rooms/${roomCode}/players`), {
            [myId]: { name: myName, x: 700, y: 300, dir: 'left', hp: 5, color: color }
          });
          onDisconnect(ref(db, `rooms/${roomCode}/players/${myId}`)).remove();
          showScreen('lobby');
          listenToRoom();
        }
      }, { onlyOnce: true });
    };

    function listenToRoom() {
      onValue(roomRef, (snapshot) => {
        const data = snapshot.val();
        if (!data) return;

        state.players = data.players || {};
        state.bullets = data.bullets || {};
        state.walls = data.walls || [];

        // Обновление списка игроков в лобби
        const list = document.getElementById('player-list');
        const countEl = document.getElementById('player-count');
        list.innerHTML = "";
        const playersArr = Object.values(state.players);
        countEl.innerText = playersArr.length;

        playersArr.forEach(p => {
          list.innerHTML += `<li class="flex items-center gap-3 p-2 bg-slate-700 rounded-lg">
            <div class="w-4 h-4 rounded-full" style="background:${p.color}"></div>
            <span class="font-medium">${p.name} ${p.name === myName ? '(Вы)' : ''}</span>
          </li>`;
        });

        if (isHost) {
          document.getElementById('btn-start-game').disabled = playersArr.length < 2;
        }

        if (data.status === 'playing' && !gameRunning) {
          startGame();
        }
      });
    }

    document.getElementById('btn-start-game').onclick = () => {
      update(roomRef, { status: 'playing' });
    };

    // --- ИГРОВОЙ ДВИЖОК ---

    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const keys = {};
    window.onkeydown = e => keys[e.code] = true;
    window.onkeyup = e => keys[e.code] = false;

    let lastShot = 0;

    function startGame() {
      gameRunning = true;
      showScreen('game');
      requestAnimationFrame(gameLoop);
    }

    function checkCollision(x, y, size) {
      // Границы карты
      if (x < size || x > 800 - size || y < size || y > 600 - size) return true;
      // Стены
      for (let wall of state.walls) {
        if (x + size > wall.x && x - size < wall.x + 40 && y + size > wall.y && y - size < wall.y + 40) {
          return true;
        }
      }
      return false;
    }

    function gameLoop() {
      if (!gameRunning) return;

      // 1. Движение игрока
      const me = state.players[myId];
      if (me && me.hp > 0) {
        const speed = 3;
        let nx = me.x, ny = me.y, ndir = me.dir;
        let moved = false;

        if (keys['ArrowUp'] || keys['KeyW']) { ny -= speed; ndir = 'up'; moved = true; }
        else if (keys['ArrowDown'] || keys['KeyS']) { ny += speed; ndir = 'down'; moved = true; }
        else if (keys['ArrowLeft'] || keys['KeyA']) { nx -= speed; ndir = 'left'; moved = true; }
        else if (keys['ArrowRight'] || keys['KeyD']) { nx += speed; ndir = 'right'; moved = true; }

        if (moved) {
          if (!checkCollision(nx, ny, 18)) {
            update(ref(db, `rooms/${roomCode}/players/${myId}`), { x: nx, y: ny, dir: ndir });
          }
        }

        if (keys['Space'] && Date.now() - lastShot > 600) {
          lastShot = Date.now();
          const bId = push(ref(db, `rooms/${roomCode}/bullets`)).key;
          set(ref(db, `rooms/${roomCode}/bullets/${bId}`), {
            x: me.x, y: me.y, dir: me.dir, owner: myId
          });
        }
      }

      // 2. Хост считает физику снарядов
      if (isHost) {
        const bulletUpdates = {};
        const playerUpdates = {};
        const wallUpdates = [...state.walls];
        let changed = false;

        for (let bId in state.bullets) {
          const b = state.bullets[bId];
          const bSpeed = 7;
          if (b.dir === 'up') b.y -= bSpeed;
          if (b.dir === 'down') b.y += bSpeed;
          if (b.dir === 'left') b.x -= bSpeed;
          if (b.dir === 'right') b.x += bSpeed;

          // Столкновение со стеной
          let hitWall = false;
          for (let i=0; i < wallUpdates.length; i++) {
            const w = wallUpdates[i];
            if (b.x > w.x && b.x < w.x + 40 && b.y > w.y && b.y < w.y + 40) {
              wallUpdates[i].hp -= 1;
              if (wallUpdates[i].hp <= 0) wallUpdates[i] = null;
              hitWall = true;
              break;
            }
          }

          // Столкновение с игроком
          let hitPlayer = false;
          for (let pId in state.players) {
            const p = state.players[pId];
            if (pId !== b.owner && p.hp > 0 && Math.hypot(p.x - b.x, p.y - b.y) < 20) {
              playerUpdates[pId] = { hp: p.hp - 1 };
              hitPlayer = true;
              break;
            }
          }

          if (hitWall || hitPlayer || b.x < 0 || b.x > 800 || b.y < 0 || b.y > 600) {
            bulletUpdates[bId] = null;
            changed = true;
          } else {
            bulletUpdates[bId] = b;
          }
        }

        if (changed) {
          update(ref(db, `rooms/${roomCode}/bullets`), bulletUpdates);
          update(ref(db, `rooms/${roomCode}/players`), playerUpdates);
          set(ref(db, `rooms/${roomCode}/walls`), wallUpdates.filter(w => w !== null));
        }
      }

      draw();
      requestAnimationFrame(gameLoop);
    }

    function draw() {
      ctx.fillStyle = '#000';
      ctx.fillRect(0, 0, 800, 600);

      // Сетка
      ctx.strokeStyle = '#111';
      for(let i=0; i<800; i+=40) { ctx.beginPath(); ctx.moveTo(i,0); ctx.lineTo(i,600); ctx.stroke(); }
      for(let i=0; i<600; i+=40) { ctx.beginPath(); ctx.moveTo(0,i); ctx.lineTo(800,i); ctx.stroke(); }

      // Стены
      state.walls.forEach(w => {
        ctx.fillStyle = w.hp > 1 ? '#555' : '#8B4513';
        ctx.fillRect(w.x + 2, w.y + 2, 36, 36);
        ctx.strokeStyle = '#000';
        ctx.strokeRect(w.x + 2, w.y + 2, 36, 36);
      });

      // Игроки
      for (let id in state.players) {
        const p = state.players[id];
        if (p.hp <= 0) continue;

        ctx.fillStyle = p.color;
        ctx.fillRect(p.x - 18, p.y - 18, 36, 36);
        
        ctx.fillStyle = '#ccc';
        if (p.dir === 'up') ctx.fillRect(p.x - 3, p.y - 25, 6, 15);
        if (p.dir === 'down') ctx.fillRect(p.x - 3, p.y + 10, 6, 15);
        if (p.dir === 'left') ctx.fillRect(p.x - 25, p.y - 3, 15, 6);
        if (p.dir === 'right') ctx.fillRect(p.x + 10, p.y - 3, 15, 6);

        // HP
        ctx.fillStyle = 'red';
        ctx.fillRect(p.x - 20, p.y - 30, 40, 5);
        ctx.fillStyle = 'lime';
        ctx.fillRect(p.x - 20, p.y - 30, 40 * (p.hp / 5), 5);
        
        ctx.fillStyle = 'white';
        ctx.font = '10px Arial';
        ctx.textAlign = 'center';
        ctx.fillText(p.name, p.x, p.y - 35);
      }

      // Пули
      for (let bId in state.bullets) {
        const b = state.bullets[bId];
        ctx.fillStyle = 'yellow';
        ctx.beginPath();
        ctx.arc(b.x, b.y, 4, 0, Math.PI*2);
        ctx.fill();
      }

      // Проверка конца игры
      const alive = Object.values(state.players).filter(p => p.hp > 0);
      if (alive.length <= 1 && gameRunning) {
        const winner = alive[0];
        showOverlay(winner && winner.name === myName ? 'win' : 'lose', winner ? winner.name : 'Никто');
      }
    }

    function showOverlay(type, winnerName) {
      gameRunning = false;
      const overlay = document.getElementById('game-overlay');
      const title = document.getElementById('overlay-title');
      const msg = document.getElementById('overlay-message');
      const icon = document.getElementById('overlay-icon');

      overlay.classList.remove('hidden');
      if (type === 'win') {
        icon.innerText = '🏆';
        title.innerText = 'ПОБЕДА!';
        msg.innerText = 'Вы стали чемпионом школы!';
      } else {
        icon.innerText = '💀';
        title.innerText = 'ПОРАЖЕНИЕ';
        msg.innerText = `Победил игрок: ${winnerName}`;
      }
    }
  </script>
</body>
</html>
